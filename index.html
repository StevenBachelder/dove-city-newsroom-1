<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dove City Daily — Tip Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;700;900&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4F3EE; --paper-dark:#EAE8E0; --card:#FFFFFF;
  --ink:#20293A; --ink-soft:#5B6377; --line:#D9D6CC;
  --stamp-red:#B3352C; --stamp-red-dark:#8E2721;
  --verify:#147D74; --verify-dark:#0E5F58;
  --highlight:#F2C94C; --highlight-soft:#FBEEC6;
  --pop:#C77B32; --ad:#8a6d1a;
  --shadow:0 2px 10px rgba(32,41,58,.10); --radius:10px;
  --font-display:'Bitter',Georgia,serif;
  --font-body:'Source Sans 3',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:16px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
img,svg,video{display:block;max-width:100%}
.hidden{display:none !important}
.screen{min-height:100vh;display:flex;flex-direction:column}

/* ---------- start ---------- */
#screen-start{align-items:center;justify-content:center;padding:32px 20px;background:
  repeating-linear-gradient(0deg,transparent 0 34px,rgba(32,41,58,.028) 34px 35px),var(--paper)}
.start-card{max-width:660px;width:100%}
.masthead{font-family:var(--font-display);font-weight:900;letter-spacing:.5px;text-align:center;border-top:4px solid var(--ink);border-bottom:1.5px solid var(--ink);padding:14px 0 10px;position:relative}
.masthead .paper-name{font-size:clamp(32px,6vw,50px);line-height:1.05}
.masthead .paper-tag{font-family:var(--font-mono);font-weight:400;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);margin-top:6px}
.lang-pick{display:flex;justify-content:center;gap:8px;margin-top:14px}
.lang-btn{font-family:var(--font-mono);font-size:12px;letter-spacing:1px;border:1.5px solid var(--line);background:var(--card);border-radius:20px;padding:6px 14px}
.lang-btn.active{border-color:var(--ink);background:var(--ink);color:#fff}
.brief{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:20px;padding:26px 28px}
.brief h2{font-family:var(--font-display);font-size:22px;margin-bottom:10px}
.brief p{margin-bottom:12px}
.memo-from{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;border-bottom:1px dashed var(--line);padding-bottom:10px}
.rules{margin:10px 0 4px;list-style:none}
.rules li{padding:7px 0 7px 30px;position:relative}
.rules li::before{content:"";position:absolute;left:0;top:11px;width:16px;height:16px;border-radius:50%;border:2px solid var(--verify)}
.rules li.rule-red::before{border-color:var(--stamp-red)}
.btn-primary{display:inline-block;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:13px 26px;font-size:17px;font-weight:700;margin-top:16px;transition:transform .08s ease,background .15s}
.btn-primary:hover{background:#111827}
.btn-blue{background:#0265B7}
.btn-blue:hover{background:#014E8D}
.btn-primary:active{transform:scale(.97)}

/* ---------- newsroom ---------- */
#screen-news{display:grid;grid-template-rows:auto 1fr;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:16px;background:var(--ink);color:#fff;padding:10px 18px;flex-wrap:wrap}
.topbar .brand{font-family:var(--font-display);font-weight:900;font-size:19px;white-space:nowrap;cursor:pointer;border:none;background:none;color:#fff;padding:0}
.topbar .brand:hover{opacity:.8}
.topbar .dayclock{font-family:var(--font-mono);font-size:13px;color:#C7CDDB;white-space:nowrap}
.meters{display:flex;gap:16px;margin-left:auto;align-items:center;flex-wrap:wrap}
.meter{min-width:118px;cursor:pointer;border:none;background:none;padding:0;text-align:left}
.meter:hover .m-label{color:#fff}
.m-info{opacity:.75;font-size:10px;margin-left:4px}
.meter .m-label{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#C7CDDB;margin-bottom:3px}
.meter .m-track{height:8px;border-radius:4px;background:rgba(255,255,255,.18);overflow:hidden}
.meter .m-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.meter.cred .m-fill{background:var(--verify)}
.meter.pop .m-fill{background:var(--pop)}
.meter.src .m-fill{background:var(--highlight)}
.btn-guide,#lang-top{background:transparent;color:#C7CDDB;border:1px solid rgba(255,255,255,.35);border-radius:6px;padding:6px 10px;font-size:13px;font-family:var(--font-mono)}
.btn-guide:hover{color:#fff;border-color:#fff}
.btn-sw{padding:5px 7px;display:inline-flex;align-items:center}
.sw{width:42px;height:20px;border-radius:10px;background:#1FA84D;position:relative;display:inline-block;transition:background .22s}
.sw.off{background:#D93025}
.sw-knob{position:absolute;top:2px;left:24px;width:16px;height:16px;border-radius:50%;background:#FFFFFF;transition:left .22s cubic-bezier(.3,1.3,.5,1);box-shadow:0 1px 2px rgba(0,0,0,.4)}
.sw.off .sw-knob{left:2px}
.memo-ps{font-style:italic;font-size:13.5px;color:var(--ink-soft);margin-top:10px}
.presscard{margin:14px 0 4px;text-align:left}
.presscard label{display:block;font-family:var(--font-mono);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px}
.presscard input{width:100%;max-width:340px;font-family:var(--font-mono);font-size:15px;padding:9px 12px;border:1.5px solid var(--ink);border-radius:8px;background:#FFFDF7}
#lang-top:disabled{opacity:.45}

.workspace{display:grid;grid-template-columns:300px 1fr 360px;min-height:0}
.pane{overflow-y:auto;min-height:0}
.queue{background:var(--paper-dark);border-right:1px solid var(--line);padding:14px}
.queue h3,.tools h3{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px}
.tipcard{width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:11px 12px;margin-bottom:9px;box-shadow:var(--shadow);position:relative;transition:transform .1s;display:flex;gap:10px;align-items:flex-start}
.tipcard:hover{transform:translateX(3px)}
.tipcard .t-icon{width:30px;height:30px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--paper-dark)}
.tipcard .t-title{font-size:13.5px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tipcard .t-buzz{font-family:var(--font-mono);font-size:11px;color:var(--pop);margin-top:5px}
.tipcard.active{outline:2.5px solid var(--ink)}
.tipcard.done{opacity:.45;pointer-events:none}
.tipcard.done .t-done{position:absolute;right:9px;bottom:7px;font-family:var(--font-mono);font-size:10px;color:var(--verify)}

.desk{padding:18px 22px;display:flex;flex-direction:column;gap:16px}
.postcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.post-head{display:flex;align-items:flex-start;gap:12px;padding:15px 18px 8px}
.post-head .p-icon{width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--paper-dark)}
.post-head .p-title{font-family:var(--font-display);font-weight:900;font-size:20px;line-height:1.2}
.post-body{padding:2px 18px 12px;font-size:15.5px;color:var(--ink)}
.photo{margin:0 18px 14px;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--paper-dark)}
.photo img,.photo video{width:100%;max-height:340px;object-fit:cover}
.media-missing{padding:26px 14px;text-align:center;font-family:var(--font-mono);font-size:12px;color:var(--ink-soft)}
.board{background:var(--paper-dark);border:1px dashed var(--ink-soft);border-radius:var(--radius);padding:12px 14px;min-height:86px}
.board h4{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:4px;display:flex;justify-content:space-between}
.board-hint{font-size:12px;font-style:italic;color:var(--ink-soft);margin-bottom:9px}
.board .b-empty{font-size:13px;color:var(--ink-soft);font-style:italic}
.evcard{background:var(--card);border-left:4px solid var(--highlight);border-radius:6px;box-shadow:var(--shadow);padding:8px 10px;margin-bottom:7px;font-size:13px;display:flex;gap:9px;align-items:center;cursor:pointer;transition:transform .1s,box-shadow .1s}
.evcard:hover{transform:translateX(2px);box-shadow:0 3px 12px rgba(32,41,58,.18)}
.evcard .e-thumb{width:46px;height:46px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--paper-dark);border:1px solid var(--line);position:relative}
.evcard .e-thumb img,.evcard .e-thumb video{width:100%;height:100%;object-fit:cover;pointer-events:none}
.evcard .e-thumb .e-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;background:rgba(20,25,35,.35)}
.evcard .e-icon{width:30px;height:30px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--paper-dark)}
.evcard .e-icon img{width:100%;height:100%;object-fit:cover}
.evcard .e-main{flex:1;min-width:0}
.evcard .e-label{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ev-viewer.is-ad{outline:3px dashed var(--ad);outline-offset:-3px}
.ad-banner{background:#DB5F0C;color:#fff;font-family:var(--font-mono);font-size:13px;font-weight:700;letter-spacing:2.5px;text-align:center;padding:9px 12px;border-radius:8px;margin-bottom:12px}
.ev-head-row{display:flex;gap:11px;align-items:center;margin-bottom:8px}
.ev-src-icon{width:36px;height:36px;border-radius:8px;overflow:hidden;background:var(--paper-dark);flex-shrink:0;border:1px solid var(--line)}
.ev-src-icon img{width:100%;height:100%;object-fit:cover}
.ev-viewer .photo{margin:0 0 12px}
.ev-viewer .photo img,.ev-viewer .photo video{max-height:52vh;width:100%;object-fit:contain;background:var(--paper-dark)}
.evcard.is-ad{border-left-color:var(--ad)}
.evcard .e-src{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);display:block;margin-top:3px}
.evcard button{background:none;border:none;color:var(--stamp-red);font-size:15px;line-height:1}
.verdict{display:flex;gap:14px;align-items:center;justify-content:center;padding:6px 0 18px;flex-wrap:wrap}
.stamp{font-family:var(--font-display);font-weight:900;font-size:18px;letter-spacing:.5px;text-transform:uppercase;padding:15px 24px;border-radius:10px;border:3px solid;background:var(--card);transition:transform .08s ease,box-shadow .08s}
.stamp:hover{transform:rotate(-2deg) scale(1.04);box-shadow:var(--shadow)}
.stamp:active{transform:rotate(-2deg) scale(.94)}
.stamp:disabled{opacity:.4;cursor:not-allowed;transform:none}
.stamp.publish{color:#1FA84D;border-color:#1FA84D}
.stamp.flag{color:#D93025;border-color:#D93025}
.verdict-hint{font-size:12.5px;color:var(--ink-soft);text-align:center;margin-bottom:8px}
.empty-desk{color:var(--ink-soft);text-align:center;margin-top:60px;font-size:15px}
.empty-desk .big{font-size:40px;margin-bottom:8px}

/* tools */
.tools{background:var(--card);border-left:1px solid var(--line);padding:16px}
.toolbox{border:1px solid var(--line);border-radius:var(--radius);padding:13px;margin-bottom:14px}
.toolbox h4{font-family:var(--font-display);font-size:15px;margin-bottom:6px}
.tool-note{font-size:12px;color:var(--ink-soft);font-style:italic;margin-bottom:8px}
.termbtn{display:block;width:100%;text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:8px 11px;margin-bottom:6px;font-family:var(--font-mono);font-size:12.5px;transition:background .12s}
.termbtn:hover{background:var(--highlight-soft);border-color:var(--highlight)}
.termbtn.used{background:var(--paper-dark);color:var(--ink-soft)}
.result{border:1px solid var(--line);border-radius:8px;padding:10px 11px;margin-top:8px;background:var(--paper)}
.result.is-ad{border-style:dashed;border-color:var(--ad);background:#FBF7EA}
.r-top{display:flex;gap:8px;align-items:flex-start}
.r-icon{width:26px;height:26px;border-radius:5px;overflow:hidden;flex-shrink:0;background:var(--paper-dark)}
.result .r-title{font-weight:700;font-size:13.5px;line-height:1.3}
.result .r-date{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-soft);margin-top:2px}
.result .r-snip{font-size:13px;margin:6px 0 8px}
.ad-chip{display:inline-block;font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ad);border:1px solid var(--ad);border-radius:4px;padding:1px 6px;margin-bottom:4px}
.rel-chip{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-soft)}
.btn-ev{background:var(--highlight-soft);border:1px solid var(--highlight);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;white-space:pre-line;text-align:center;line-height:1.3}
.btn-ev:disabled{opacity:.5;cursor:default}
.imgres{border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:8px;background:var(--paper)}
.imgres .thumb{border:1px solid var(--line);border-radius:5px;overflow:hidden;margin-bottom:7px;background:var(--paper-dark)}
.imgres .thumb img,.imgres .thumb video{width:100%;max-height:150px;object-fit:cover}
.imgres .im-meta{font-size:12.5px}
.imgres .im-src{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);margin-top:3px}

#viewer-mount .overlay{z-index:80}

.fb-explain{margin:20px 0 22px}
.ripple{border-radius:8px;padding:9px 12px;margin:10px 0;font-size:13px;border:1.5px solid}
.ripple.bad{background:#FBF3E4;border-color:#D9A441;color:#7A5A17}
.ripple.good{background:#EEF7EE;border-color:#8FC79A;color:#2F6B3A}
img[data-zoom]{cursor:zoom-in}
.lightbox{position:fixed;inset:0;background:rgba(14,18,28,.93);z-index:130;display:flex;align-items:center;justify-content:center;padding:22px;cursor:zoom-out}
.lightbox img{max-width:96vw;max-height:92vh;border-radius:8px;box-shadow:0 12px 48px rgba(0,0,0,.55);background:#fff}
.lb-close{position:fixed;top:14px;right:18px;font-size:30px;color:#fff;background:none;border:none;cursor:pointer;line-height:1;opacity:.85}
.lb-close:hover{opacity:1}
.replybeat{background:#F4F7FB;border:1.5px solid #B9C6D8;border-radius:10px;padding:12px 14px;margin:14px 0}
.rb-prompt{font-size:14px;font-weight:600;margin-bottom:9px}
.rb-btns{display:flex;flex-wrap:wrap;gap:8px}
.rb-btn{font-family:var(--font-mono);font-size:12.5px;padding:8px 12px;border:1.5px solid var(--ink);border-radius:8px;background:#fff;cursor:pointer}
.rb-btn:hover:not(:disabled){background:var(--ink);color:#fff}
.rb-btn:disabled{opacity:.45;cursor:not-allowed}
.rb-btn.rb-helpful{border-color:#0E5F58;color:#0E5F58}
.rb-btn.rb-helpful:hover:not(:disabled){background:#0E5F58;color:#fff}
.rb-need{font-size:12px;color:var(--ink-soft);margin-top:7px;font-style:italic}
.rb-out{font-size:13.5px;line-height:1.5}
.rb-out.good{color:#0E5F58}

/* pinned-evidence review strip in the feedback modal */
.fb-ev-head{font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin:12px 0 7px}
.fb-ev{display:flex;flex-wrap:wrap;gap:8px}
.fb-evcard{display:flex;align-items:center;gap:8px;background:var(--paper);border:1.5px solid var(--line);border-radius:8px;padding:6px 9px 6px 6px;cursor:pointer;max-width:100%;transition:transform .1s,border-color .1s}
.fb-evcard:hover{transform:translateY(-1px);border-color:var(--ink-soft)}
.fb-evcard.backed{border-color:var(--verify)}
.fb-evcard.is-ad{border-color:var(--ad);border-style:dashed;background:#FBF7EA}
.fb-evcard .fe-thumb{width:38px;height:38px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--paper-dark);position:relative}
.fb-evcard .fe-thumb img,.fb-evcard .fe-thumb video{width:100%;height:100%;object-fit:cover;pointer-events:none}
.fb-evcard .fe-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;background:rgba(20,25,35,.35)}
.fb-evcard .fe-label{font-size:12.5px;line-height:1.25;max-width:150px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fb-evcard .fe-badge{font-size:13px;flex-shrink:0}

.fe-pts{font-family:var(--font-mono);font-size:12.5px;font-weight:600;flex-shrink:0;border-radius:5px;padding:2px 6px}
.fe-pts.pos{color:#0E5F58;background:#E2F1EE}
.fe-pts.neg{color:#8E2721;background:#F7E4E1}
.ev-pts{border:1.5px solid var(--line);border-radius:9px;padding:9px 12px;margin:10px 0 4px;background:var(--paper)}
.ev-pts .ep-num{font-family:var(--font-mono);font-size:20px;font-weight:700;margin-right:8px}
.ev-pts.pos .ep-num{color:#0E5F58}
.ev-pts.neg .ep-num{color:#8E2721}
.ev-pts .ep-label{font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft)}
.ev-pts .ep-why{font-size:13px;margin-top:5px}

/* meter nudge toast */
.nudge{position:fixed;top:64px;right:16px;z-index:60;background:var(--ink);color:#fff;border-radius:10px;
  padding:11px 15px;font-size:13.5px;max-width:270px;box-shadow:0 8px 26px rgba(0,0,0,.35);cursor:pointer;
  animation:nudgein .4s ease}
.nudge::before{content:"";position:absolute;top:-7px;right:34px;border:7px solid transparent;border-bottom-color:var(--ink);border-top:none}
@keyframes nudgein{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* modal / feedback */
.overlay{position:fixed;inset:0;background:rgba(24,30,44,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
.modal{background:var(--card);border-radius:14px;max-width:580px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 18px 60px rgba(0,0,0,.35)}
.modal-head{padding:18px 22px 0}
.verdict-banner{font-family:var(--font-display);font-weight:900;font-size:24px;padding:14px 22px;border-radius:10px;text-align:center;transform:rotate(-1.5deg);border:3px solid;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:9px;flex-wrap:wrap}
.v-total{font-family:inherit;font-size:inherit;font-weight:inherit;opacity:0;transform:translateX(-6px)}
.v-total.show{animation:totalpop .4s ease forwards}
@keyframes totalpop{to{opacity:1;transform:none}}
.verdict-banner.good{color:#FFFFFF;border-color:#157F3C;background:#1FA84D;text-shadow:0 1px 2px rgba(0,0,0,.25)}
.verdict-banner.bad{color:#FFFFFF;border-color:#A81E14;background:#D93025;text-shadow:0 1px 2px rgba(0,0,0,.25)}
.modal-body{padding:10px 22px 22px}
.modal-body p{margin-bottom:10px;font-size:14.5px}
.editor-quote{display:flex;gap:12px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px;margin:12px 0}
.fp-sarah{text-align:left;max-width:560px;width:100%;margin:16px auto 4px}
.letter{text-align:left;max-width:560px;width:100%;margin:16px auto 0;border-radius:10px;padding:13px 15px;border:1.5px solid}
.letter.hurt{background:#FBF0EE;border-color:#D9968C}
.letter.thanks{background:#EEF7EE;border-color:#8FC79A}
.letter.miffed{background:#F4F1E4;border-color:#CBBE8A}
.letter.inside{background:#F7F5EE;border:1.5px dashed #9AA0AA}
.tadseed{border-left:4px solid #10254E}
.letter.inside .l-text{font-family:var(--font-mono);font-style:normal;font-size:13px;line-height:1.55}
.letter .l-head{font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
.letter .l-text{font-size:14px;font-style:italic;line-height:1.5}
.letter .l-who{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);margin-top:6px;text-align:right}
.editor-quote .avatar{width:42px;height:42px;border-radius:50%;background:#E5E0D3;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}

<script>
/* =====================================================================
   ENGINE — reads CASES (migrated data), languageData (your original
   4-language content) and extraStrings (new-mechanic strings).
   ===================================================================== */
const $ = s => document.querySelector(s);
const LANGS = [["en","English"],["sv","Svenska"],["fi","Suomi"],["et","Eesti"]];
let lang = "en";

function t(key){
  const ex = extraStrings[lang] || {}, exEn = extraStrings.en;
  if (ex[key] !== undefined) return ex[key];
  if (exEn[key] !== undefined) return exEn[key];
  const ld = (typeof languageData!=="undefined") ? languageData : {};
  if (ld[lang] && ld[lang][key] !== undefined) return ld[lang][key];
  if (ld.en && ld.en[key] !== undefined) return ld.en[key];
  return key;
}
function tf(key, vars){ let s=t(key); for(const k in (vars||{})) s=s.replace("{"+k+"}", vars[k]); return s; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function clamp(v){ return Math.max(0, Math.min(100, v)); }

const RELEVANCE = [ {key:"relevanceReasoning_1",score:8},{key:"relevanceReasoning_2",score:7},
                    {key:"relevanceReasoning_3",score:6},{key:"relevanceReasoning_4",score:4} ];
const TECH_LIST = ["manipulated","outofcontext","conspiracy","unverified","polarization","hoax","emotionaltrue","sponsored"];
const SKILL_MAP = { manipulated:"image", outofcontext:"image", emotionaltrue:"claims",
                    conspiracy:"claims", polarization:"claims", unverified:"source",
                    hoax:"source", genuine:"source" };
const MAX_PINS = 3;

/* ---------- tiny synth for score ticks (no audio files needed) ---------- */
let _ac=null;
document.addEventListener("pointerdown",function _unlock(){
  const a=_audio(); if(!a) return;
  try{ const b=a.createBuffer(1,1,22050), src=a.createBufferSource();
       src.buffer=b; src.connect(a.destination); src.start(0); }catch(e){}
},{once:true,capture:true});
function _audio(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC) return null;
    _ac=_ac||new AC();
    if(_ac.state==="suspended")_ac.resume();
    return _ac;
  }catch(e){return null;}
}
let _verbNode=null;
function _verb(a){
  if(_verbNode) return _verbNode;
  try{
    const len=Math.floor(a.sampleRate*1.4), buf=a.createBuffer(2,len,a.sampleRate);
    for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6); }
    const cv=a.createConvolver(); cv.buffer=buf;
    const wet=a.createGain(); wet.gain.value=0.55;
    cv.connect(wet); wet.connect(a.destination);
    _verbNode=cv; return cv;
  }catch(e){ return null; }
}
function blip(freq,dur,type,vol,wet){
  if(state.muted) return;
  const a=_audio(); if(!a) return;
  try{
    const o=a.createOscillator(), g=a.createGain();
    o.type=type||"square"; o.frequency.value=freq;
    const t0=a.currentTime+0.02;
    g.gain.setValueAtTime(vol||0.09,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+(dur||0.05));
    o.connect(g); g.connect(a.destination);
    if(wet){ const v=_verb(a); if(v) g.connect(v); }
    o.start(t0); o.stop(t0+(dur||0.05)+0.01);
  }catch(e){}
}
function sweep(f1,f2,dur,vol){
  if(state.muted) return;
  const a=_audio(); if(!a) return;
  try{
    const o=a.createOscillator(), g=a.createGain();
    const t0=a.currentTime+0.02;
    o.type="sine"; o.frequency.setValueAtTime(f1,t0);
    o.frequency.exponentialRampToValueAtTime(f2,t0+dur);
    g.gain.setValueAtTime(vol,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
    o.connect(g); g.connect(a.destination);
    o.start(t0); o.stop(t0+dur+0.01);
  }catch(e){}
}
let _noiseB=null;
function _noise(a){
  if(_noiseB) return _noiseB;
  const len=Math.floor(a.sampleRate*0.5), b=a.createBuffer(1,len,a.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  _noiseB=b; return b;
}
function swish(f1,f2,dur,vol,q){          // filtered-noise whoosh; low q = broad/airy (paper), high q = focused
  if(state.muted) return;
  const a=_audio(); if(!a) return;
  try{
    const src=a.createBufferSource(); src.buffer=_noise(a); src.loop=true;
    const f=a.createBiquadFilter(); f.type="bandpass"; f.Q.value=q||1.4;
    const t0=a.currentTime+0.02;
    f.frequency.setValueAtTime(f1,t0);
    f.frequency.exponentialRampToValueAtTime(f2,t0+dur);
    const g=a.createGain();
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol,t0+dur*0.35);
    g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
    src.connect(f); f.connect(g); g.connect(a.destination);
    src.start(t0); src.stop(t0+dur+0.02);
  }catch(e){}

function thump(vol,f0){                    // landing: low knock + air tick (f0 sets the pitch)
  if(state.muted) return;
  const a=_audio(); if(!a) return;
  try{
    const o=a.createOscillator(), g=a.createGain();
    const t0=a.currentTime+0.02;
    f0=f0||175;
    o.type="sine"; o.frequency.setValueAtTime(f0,t0);
    o.frequency.exponentialRampToValueAtTime(f0*0.6,t0+0.07);
    g.gain.setValueAtTime(vol,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+0.09);
    o.connect(g); g.connect(a.destination); o.start(t0); o.stop(t0+0.1);
  }catch(e){}
  swish(900,500,0.04,0.05);
}

(function shortShift(){
  const n=parseInt(PARAMS.get("cases"));
  if(!(n>=3&&n<CASES.length)) return;
  const seen=new Set(), pick=[];
  for(const c of CASES){ if(!seen.has(c.technique)){ seen.add(c.technique); pick.push(c); } if(pick.length>=n) break; }
  for(const c of CASES){ if(pick.length>=n) break; if(!pick.includes(c)) pick.push(c); }
  pick.sort((a,b)=>CASES.indexOf(a)-CASES.indexOf(b));
  const subset=pick.map((c,i)=>Object.assign({},c,{day:Math.floor(i/6)+1}));
  CASES.length=0; subset.forEach(c=>CASES.push(c));
})();
const MAX_DAY = Math.max(...CASES.map(c=>c.day));
const RIPPLES = (()=>{
  const firstFake=d=>CASES.find(c=>c.day===d&&!c.truth);
  const out=[];
  for(let d=1;d<MAX_DAY;d++){ const a=firstFake(d),b=firstFake(d+1); if(a&&b) out.push({src:a.id,dst:b.id}); }
  return out;
})();

/* per-pin SOURCE value: authority of the source decides the reward */
function calcPts(ev){
  if(ev.isAd) return -4;
  if(ev.supports){
    if(ev.kind==="img"||ev.kind==="video") return 3;          // original context found visually
    return [4,3,2,2][Math.min(Math.max(ev.rIdx||0,0),3)];     // official → weaker outlet
  }
  return -1;                                                   // pinned, but beside the point
}
function pin(ev){
  if(state.evidence.some(e=>e.key===ev.key)) return false;
  ev.pts=calcPts(ev);
  // swap detection: replacing a previously unpinned, weaker source with a stronger one
  const weaker=state.caseUnpinned.filter(p=>p<ev.pts);
  if(weaker.length){
    const consumed=Math.min(...weaker);
    state.caseUnpinned.splice(state.caseUnpinned.indexOf(consumed),1);
    state.upgrades++;
  }
  if(state.evidence.length>=MAX_PINS){ alert(t("evidenceLimitReached")+" ("+MAX_PINS+"). "+t("qualityOverQuantity")); return false; }
  if(ev.isAd) state.adPinned=true;
  state.evidence.push(ev); renderBoard(); return true;
}

/* ---------- verdict ---------- */
function verdict(choice){
  const c=caseById(state.current);
  if(!c || state.handled[c.id]) return;
  const correct=(choice==="publish")===c.truth;
  const evOk=state.evidence.some(e=>e.supports);
  const adUsed=state.evidence.some(e=>e.isAd);
  const before={cred:state.cred,pop:state.pop,src:state.src};
  let events=[], dc=0, dp=0;
  if(correct){
    if(c.truth){ dc+=8; dp+=c.buzz;
      events.push({m:"cred",amt:8,label:tf("dCredPlusVerified",{n:8})},{m:"pop",amt:c.buzz,label:tf("dPopPlusLoved",{n:c.buzz})}); }
    else { dc+=12; dp+=2;
      events.push({m:"cred",amt:12,label:tf("dCredPlusStopped",{n:12})},{m:"pop",amt:2,label:tf("dPopPlusTrust",{n:2})}); }
  } else {
    if(!c.truth){ dp+=c.buzz; dc-=18; const back=Math.round(c.buzz*1.5); dp-=back;
      events.push({m:"pop",amt:c.buzz,label:tf("dPopPlusViral",{n:c.buzz})},{m:"cred",amt:-18,label:tf("dCredMinusCorrection",{n:18})},{m:"pop",amt:-back,label:tf("dPopMinusFooled",{n:back})}); }
    else { dc-=8; dp-=6;
      events.push({m:"cred",amt:-8,label:tf("dCredMinusBuried",{n:8})},{m:"pop",amt:-6,label:tf("dPopMinusScooped",{n:6})}); }
  }
  const ds=state.evidence.reduce((sum,e)=>sum+(e.pts||0),0);
  state.evidence.forEach(e=>{state.pinSum+=(e.pts||0); state.pinCount++;});
  if(ds>0) events.push({m:"src",amt:ds,label:tf("dSrcPlusBacked",{n:ds})});
  else if(ds<0) events.push({m:"src",amt:ds,label:tf(adUsed?"dSrcMinusAd":"dSrcMinusWeak",{n:Math.abs(ds)})});
  setMeters(dc,dp,ds);
  state.handled[c.id]={choice,correct,evOk};
  const sk=SKILL_MAP[c.technique]||"source";
  state.skills[sk].n++; if(correct) state.skills[sk].ok++;
  state.skills.evidence.n++; if(evOk) state.skills.evidence.ok++;
  if(c.technique!=="genuine"){ state.seenTech.add(c.technique); if(correct) state.badges.add(c.technique); }
  if(adUsed) state.seenTech.add("sponsored");
  feedback(c,choice,correct,evOk,adUsed,events,before);
}

/* animated score tally: plays events in narrative order with rising/falling blips */
function animateTally(events,before){
  const vals={cred:before.cred,pop:before.pop,src:before.src};
  const el=m=>document.getElementById("tally-"+m);
  let ev=0;
  function runEvent(){
    if(!el("cred")) return;                     // modal closed — stop silently
    if(ev>=events.length){
      const net=events.reduce((s,e)=>s+e.amt,0);
      setTimeout(()=>{                        // suspense beat before the reveal
        if(!el("cred")) return;               // modal closed meanwhile
        (net>=0?chordUp:thudDown)();
        const tot=document.getElementById("v-total"); if(tot) tot.classList.add("show");
      },650);
      return;
    }
    const e=events[ev++];
    const chip=document.querySelector('.delta[data-ev="'+(ev-1)+'"]');
    if(chip) chip.classList.add("show");
    const dir=e.amt>0?1:-1, total=Math.abs(e.amt);
    const stepSize=total>16?2:1, stepMs=total>16?55:65;
    let done=0, i=0;
    (function step(){
      if(!el(e.m)) return;                      // modal closed
      const inc=Math.min(stepSize,total-done);
      done+=inc;
      vals[e.m]=clamp(vals[e.m]+dir*inc);
      const node=el(e.m);
      node.textContent=vals[e.m];
      node.classList.remove("bump-up","bump-down"); void node.offsetWidth;
      node.classList.add(dir>0?"bump-up":"bump-down");
      dir>0?tickUp(i):tickDown(i); i++;
      if(done<total) setTimeout(step,stepMs);
      else setTimeout(runEvent,320);            // beat between events
    })();
  }
  setTimeout(runEvent,420);                     // let the banner land first
}

  const meta={source:["skillSource","skillSourceTip"],image:["skillImage","skillImageTip"],claims:["skillClaims","skillClaimsTip"],evidence:["skillEvidence","skillEvidenceTip"]};
  const skills=Object.entries(state.skills).map(([k,v])=>{

      <div class="s-score">${v.ok}/${v.n} · ${esc(t(meta[k][1]))}</div></div>`;}).join("");
const BADGE_COLORS={manipulated:"#9DCBF8",polarization:"#B48EC1",outofcontext:"#7F9DB5",hoax:"#9DA5AE",conspiracy:"#C5FEAC",emotionaltrue:"#FEA7A1",unverified:"#BEC2FD",adspotter:"#FACBB4",master:"#69C7BE"};
const CARD_BACK={master:{h:"#16695e",b:"#9fc9b7"},manipulated:{h:"#345ba3",b:"#a1c9eb"},adspotter:{h:"#972165",b:"#edbfab"},unverified:{h:"#713a96",b:"#d5bde5"},emotionaltrue:{h:"#bc1f4b",b:"#cec0de"},conspiracy:{h:"#61573d",b:"#cec0de"},hoax:{h:"#565b64",b:"#abaeb7"},outofcontext:{h:"#386489",b:"#8cc2c4"},polarization:{h:"#d22027",b:"#f8dec5"}};
  const cardSpec = TECH_LIST.filter(k=>k!=="sponsored").map(k=>(
    {k, img:"badge_"+k, earned:state.badges.has(k), body:t("tq_"+k+"_body")}))
    .concat([{k:"adspotter", img:"badge_adspotter", earned:!state.adPinned, body:t("tq_sponsored_body")},
             {k:"master", img:"badge_generic", earned:(state.badges.size+(state.adPinned?0:1))===8, body:t("badgeMasterBody")}]);
  let badgeHtml=cardSpec.map(c=>
    `<span class="badge flipcard ${c.earned?"":"missed"}" role="button" tabindex="0" title="${esc(t("flipHint"))}"><span class="flip-inner">
      <span class="flip-front"><span class="fbf-head">${esc(t("cardT_"+c.k))}</span>
        <span class="fbf-body"><img class="badge-img" src="Badges/${c.img}.png" alt="" onerror="this.style.display='none'"><span class="b-pts">${c.earned?"+25":"+0"}</span></span>
        <span class="flip-cue">↻</span></span>
      <span class="flip-back" style="background:${CARD_BACK[c.k].b}"><span class="fbk-head" style="background:${CARD_BACK[c.k].h}">${esc(t("cardT_"+c.k))}</span>
        <span class="fbk-sub">${esc(t("cardS_"+c.k))}</span>
        <span class="fbk-body">${esc(c.body)}</span></span>
    </span></span>`).join("");
  const badgeCount = state.badges.size + (state.adPinned?0:1);
  const avgPin = state.pinCount? state.pinSum/state.pinCount : 0;
  const corePts = right*10 + state.cred + state.pop + (FLAG_SRC?state.src:0) + (FLAG_BADGES?badgeCount*25:0);
  const scoreRows = [];
  if(FLAG_BADGES && badgeCount===8) scoreRows.push({label:t("scoreMaster"), pts:25});
  if(FLAG_SRC && state.upgrades>0) scoreRows.push({label:tf("scoreSwaps",{n:state.upgrades}), pts:state.upgrades*10});
  const avgBonus = avgPin>=3?30:avgPin>=2?15:0;
  if(FLAG_SRC && avgBonus) scoreRows.push({label:t("scoreAvg"), pts:avgBonus});
  if(right===total) scoreRows.push({label:t("scoreSweep"), pts:50});
  const editorScore = corePts + scoreRows.reduce((s,r)=>s+r.pts,0);
  const RESULTS = {
    version:"dcn-1.0", timestamp:new Date().toISOString(),
    pid:state.pid||null, name:state.playerName||null, lang,
    score:editorScore, rightCalls:right, totalCases:total,
    badges:[...state.badges], adSpotter:!state.adPinned, masterBadge:(state.badges.size+(state.adPinned?0:1))===8,
    badgeCount:state.badges.size+(state.adPinned?0:1),
    credibility:state.cred, popularity:state.pop, source:state.src,
    avgPinValue:state.pinCount?+(state.pinSum/state.pinCount).toFixed(2):0,
    replies:Object.assign({},state.replies),
    tadThread:{ stormingCorrect:!!(state.handled[17]&&state.handled[17].correct&&state.handled[17].choice==="flag"),
                insideNoteShown:!!(state.handled[17]&&state.handled[17].correct&&state.handled[17].choice==="flag") },
    pinsPlaced:state.pinCount, upgrades:state.upgrades,
    skills:state.skills
  };
  window.SOURCE_RESULTS = RESULTS;
  try{ if(window.parent&&window.parent!==window) window.parent.postMessage({type:"SOURCE_MINIGAME_RESULTS",payload:RESULTS},"*"); }catch(e){}
  const scoreHtml = `<div class="scorebox">
      <div class="sb-label">${esc(t("scoreTitle"))}${state.playerName?` — ${esc(state.playerName)}`:""}</div>
      <div class="sb-total" id="sb-total">0</div>
      <div class="sb-meters">
        ${[[t("scoreRight"),right*10,right/total*100,"#1FA84D",right+"/"+total]]
          .concat(FLAG_BADGES?[[t("scoreBadgesBar"),badgeCount*25,badgeCount/8*100,"#8C3E9A",badgeCount+"/8"]]:[])
          .concat([[t("credibility"),state.cred,state.cred,"#3A7B74",null],
                   [t("popularity"),state.pop,state.pop,"#BD7F41",null]])
          .concat(FLAG_SRC?[[t("srcLabel"),state.src,state.src,"#EBCA62",null]]:[]).map(m=>`
        <div class="sb-meter">
          <div class="sbm-head"><span>${esc(m[0])}</span><span class="sbm-num">${m[1]}</span></div>
          <div class="sbm-track ${m[4]?"has-frac":""}">${m[4]?`<span class="sbm-frac" style="left:clamp(36px, ${m[2]}%, 100%)">${m[4]}</span>`:""}<div class="sbm-fill" style="width:${m[2]}%;background:${m[3]}"></div></div>
        </div>`).join("")}
      </div>
      <div class="sb-rows">${scoreRows.map((r,i)=>`<div class="sb-row" data-sbrow="${i}"><span>${esc(r.label)}</span><span class="sb-pts">+${r.pts}</span></div>`).join("")}</div>
      <button class="sb-export" id="sb-export">${esc(t("resultsCopy"))}</button>
      <button class="sb-export sb-card" id="card-download">🪪 ${esc(t((state.cred>=60&&!(fired||state.cred<25))?"cardDownload":"reportDownload"))}</button>
    </div>`;
  $("#screen-end").innerHTML=`
    <div class="debrief">
      <div class="ending"><div class="end-emoji">${tier.e}</div><h2>${esc(tier.t)}</h2><p>${esc(tier.d)}</p>
        ${scoreHtml}
        ${FLAG_BADGES?`<div class="badges">${badgeHtml}</div>`:""}</div>
      <div class="skillgrid">${skills}</div>
      ${FLAG_SRC?`<div class="discipline">
        <h3>${esc(t("swapTitle"))}</h3>
        <p>${esc(tf("avgPinLine",{v:(state.pinCount?((state.pinSum/state.pinCount>=0?"+":"")+(state.pinSum/state.pinCount).toFixed(1)):"—")}))}</p>
        ${state.upgrades>0
          ? `<p class="disc-praise">🔁 ${esc(state.upgrades===1?t("swapPraiseOne"):tf("swapPraiseMany",{n:state.upgrades}))}</p>`
          : state.unpins>0
          ? `<p>${esc(state.unpins===1?t("swapNeutralOne"):tf("swapNeutralMany",{n:state.unpins}))}</p>`
          : ``}
      </div>`:""}
      ${state.replies.helpful>0?`<div class="discipline"><h3>${esc(t("replyTitle"))}</h3><p class="disc-praise">💬 ${esc(tf("replyDebrief",{n:state.replies.helpful}))}</p></div>`:""}
      ${(state.handled[17]&&state.handled[17].correct&&state.handled[17].choice==="flag")?`<div class="discipline tadseed"><h3>${esc(t("tadSeedTitle"))}</h3><p>${esc(t("tadSeedBody"))}</p></div>`:""}
      <div class="takeaways"><h3>${esc(t("takeHead"))}</h3>
        <p><strong>1.</strong> ${esc(t("take1"))}</p><p><strong>2.</strong> ${esc(t("take2"))}</p>
        <p><strong>3.</strong> ${esc(t("take3"))}</p><p><strong>4.</strong> ${esc(t("take4"))}</p>
        <p><strong>5.</strong> ${esc(t("take5"))}</p></div>
      <div style="text-align:center"><button class="btn-primary btn-blue" id="btn-replay">${esc(t("replayBtn"))}</button></div>
    </div>`;
  show("screen-end");
  const cardBtn=document.getElementById("card-download");
  if(cardBtn) cardBtn.addEventListener("click",async()=>{
    uiClick();
    try{
      const hired = state.cred>=60 && !(fired||state.cred<25);
      const missedT = TECH_LIST.filter(k=>k!=="sponsored"&&!state.badges.has(k)).map(k=>t("tq_"+k+"_name"));
      const wrongPub = CASES.filter(c=>state.handled[c.id]&&!c.truth&&state.handled[c.id].choice==="publish").length;
      const wrongFlag = CASES.filter(c=>state.handled[c.id]&&c.truth&&state.handled[c.id].choice==="flag").length;
      const well=[], improve=[];
      if(right>=Math.ceil(total*0.75)) well.push(tf("repWellRight",{r:right,t:total}));
      if(badgeCount>0) well.push(tf("repWellBadges",{n:badgeCount}));
      if(!state.adPinned) well.push(t("repWellAds"));
      if(avgPin>=3) well.push(tf("repWellAvg",{v:avgPin.toFixed(1)}));
      if(state.upgrades>0) well.push(tf("repWellUpgrades",{n:state.upgrades}));
      if(state.replies.helpful>0) well.push(tf("repWellReplies",{n:state.replies.helpful}));
      if(!well.length) well.push(t("repWellShowedUp"));
      if(missedT.length) improve.push(tf("repImpTechs",{list:missedT.join(" · ")}));
      if(state.adPinned) improve.push(t("repImpAds"));
      if(avgPin>0&&avgPin<2.5) improve.push(tf("repImpAvg",{v:avgPin.toFixed(1)}));
      if(wrongPub>0) improve.push(tf("repImpPublished",{n:wrongPub}));
      if(wrongFlag>0) improve.push(tf("repImpBuried",{n:wrongFlag}));
      if(state.replies.blunt>state.replies.helpful) improve.push(t("repImpReplies"));
      if(!improve.length) improve.push(t("repImpNone"));
      const ledger = CASES.filter(c=>state.handled[c.id]).map(c=>{
        let ti=t(c.title); if(ti.length>52) ti=ti.slice(0,50)+"…";
        return {ok:state.handled[c.id].correct, title:ti}; });
      const canvas=await drawPressCard({
        hired, name:state.playerName||"—",
        status:tier.t, reportTitle:t("repTitle"),
        score:editorScore, scoreLabel:t("scoreTitle"),
        brand:t("brandName"), role:t("cardRole"),
        secSession:t("repSecSession"), secWell:t("repSecWell"),
        secImprove:t("repSecImprove"), secLedger:t("repSecLedger"),
        stats:[[t("scoreRight"),right+" / "+total],[t("scoreBadgesBar"),badgeCount+" / 8"],
               [t("credibility"),state.cred],[t("popularity"),state.pop],
               [t("srcLabel"),state.src],[t("avgPinShort"),avgPin?avgPin.toFixed(2):"—"],
               [t("upgradesShort"),state.upgrades],[t("repliesShort"),state.replies.helpful]],
        well, improve, ledger,
        backTitle:t("cardBackTitle"), backFoot:t("cardBackFoot"),
        techs:TECH_LIST.filter(k=>k!=="sponsored").map(k=>t("tq_"+k+"_name")).concat([t("badgeAds")]),
        earned:TECH_LIST.filter(k=>k!=="sponsored"&&state.badges.has(k)).map(k=>"Badges/badge_"+k+".png")
          .concat(state.adPinned?[]:["Badges/badge_adspotter.png"])
          .concat(badgeCount===8?["Badges/badge_generic.png"]:[])
      });
      if(!canvas){ cardBtn.textContent=t("cardUnavailable"); return; }
      const fname = hired ? "dove-city-press-card.png" : "dove-city-applicant-report.png";
      const dl=b=>{ const a=document.createElement("a"); a.href=b; a.download=fname; document.body.appendChild(a); a.click(); a.remove(); };
      if(canvas.toBlob) canvas.toBlob(b=>{ if(b) dl(URL.createObjectURL(b)); else dl(canvas.toDataURL("image/png")); },"image/png");
      else dl(canvas.toDataURL("image/png"));
    }catch(e){ cardBtn.textContent=t("cardUnavailable"); }
  });
  const exBtn=document.getElementById("sb-export");
  if(exBtn) exBtn.addEventListener("click",()=>{
    const txt=JSON.stringify(RESULTS,null,2);
    const done=()=>{ sfxCopy(); exBtn.textContent=t("resultsCopied"); setTimeout(()=>{exBtn.textContent=t("resultsCopy");},1800); };
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done,()=>fallback()); }
    else fallback();
    function fallback(){
      const ta=document.createElement("textarea"); ta.value=txt; document.body.appendChild(ta);
      ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); done();
    }
  });
  document.querySelectorAll(".flipcard").forEach(card=>{
    const flip=()=>{ card.classList.toggle("flipped"); flipSound(card.classList.contains("flipped")); };
    card.addEventListener("click",flip);
    card.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();flip();}});
  });
  (function animateScore(){
    const totalEl=document.getElementById("sb-total"); if(!totalEl) return;
    const rows=[...document.querySelectorAll(".sb-row")];
    const target=editorScore;
    let shown=0, val=0;
    (function revealRow(){
      if(shown<rows.length){ rows[shown].classList.add("show"); shown++; setTimeout(revealRow,340); return; }
      const step=Math.max(1,Math.round(target/60));
      let i=0;
      (function tick(){
        if(!document.getElementById("sb-total")) return;
        val=Math.min(target,val+step);
        totalEl.textContent=val;
        if(i%3===0) tickUp(Math.min(i/3,14)); i++;
        if(val<target) setTimeout(tick,28); else { setTimeout(chordUp,180); totalEl.classList.add("done"); }
      })();
    })();
  })();
  $("#btn-replay").addEventListener("click",()=>{ uiClick(); setTimeout(()=>location.reload(),120); });
}

/* ---------- field guide ---------- */
function openGuide(){
  const entries=TECH_LIST.map(k=>{
    const seen=state.seenTech.has(k);
    const medal = (k==="sponsored") ? "badge_adspotter" : (k==="genuine") ? "badge_generic" : "badge_"+k;
    return `<div class="guide-entry ${seen?"":"locked"}">
      ${FLAG_BADGES?`<img class="guide-entry-medal" src="Badges/${medal}.png" alt="" onerror="this.style.display='none'">`:""}
      ${seen?`<h4>${esc(t("tq_"+k+"_name"))}</h4>`:""}
      <p>${esc(seen?t("tq_"+k+"_body"):t(FLAG_BADGES?"guideLockedBody":"guideLockedBodyPlain"))}</p></div>`;}).join("");
  const mount=$("#modal-mount");
  mount.innerHTML=`<div class="overlay" id="g-ov"><div class="modal">
    <div class="modal-head"><h2 style="font-family:var(--font-display);font-size:22px;padding-bottom:4px">${esc(t("guideTitle"))}</h2>
    <div style="display:flex;gap:12px;align-items:center">${FLAG_BADGES?`<img class="guide-medal" src="Badges/badge_generic.png" alt="" onerror="this.style.display='none'">`:""}<p style="font-size:13.5px;color:var(--ink-soft);margin:0">${esc(t("guideSub"))}</p></div></div>
    <div class="guide-list">${entries}</div>
    <div class="modal-body"><button class="btn-primary" id="g-close">${esc(t("backToDesk"))}</button></div></div></div>`;
  $("#g-close").addEventListener("click",()=>{ sfxClose(); mount.innerHTML=""; });
  $("#g-ov").addEventListener("click",e=>{if(e.target.id==="g-ov"){ sfxClose(); mount.innerHTML=""; }});
}
function openMeterInfo(){
  const mount=$("#modal-mount");
  mount.innerHTML=`<div class="overlay" id="mi-ov"><div class="modal">
    <div class="modal-head"><h2 style="font-family:var(--font-display);font-size:22px;padding-bottom:2px;white-space:pre-line">${esc(t("meterInfoTitle"))}</h2></div>
    <div class="modal-body">
      <div class="techcard" style="border-color:var(--verify)">
        <div class="tc-top" style="background:var(--verify)">${esc(t("credibility"))}</div>
        <div class="tc-body">${esc(t("meterCredBody"))}</div>
      </div>
      <div class="techcard" style="border-color:var(--pop)">
        <div class="tc-top" style="background:var(--pop)">${esc(t("popularity"))}</div>
        <div class="tc-body">${esc(t("meterPopBody"))}</div>
      </div>
      <div class="techcard" style="border-color:var(--highlight)">
        <div class="tc-top" style="background:#A8841B">${esc(t("srcLabel"))}</div>
        <div class="tc-body">${esc(t("meterSrcBody"))}</div>
      </div>
      <div class="ev-note warn" style="margin-top:10px">${esc(t("meterTension"))}</div>
      <button class="btn-primary" id="mi-close" style="margin-top:14px">${esc(t("backToDesk"))}</button>
    </div></div></div>`;
  $("#mi-close").addEventListener("click",()=>{ sfxClose(); mount.innerHTML=""; });
  $("#mi-ov").addEventListener("click",e=>{if(e.target.id==="mi-ov"){ sfxClose(); mount.innerHTML=""; }});
}
function openLightbox(src){
  const old=document.getElementById("lightbox"); if(old) old.remove();
  const lb=document.createElement("div"); lb.className="lightbox"; lb.id="lightbox";
  lb.innerHTML=`<button class="lb-close" aria-label="${esc(t("close"))}">✕</button><img src="${esc(src)}" alt="">`;
  lb.addEventListener("click",()=>{ sfxClose(); lb.remove(); });
  document.body.appendChild(lb);
  sfxOpen();
}
document.addEventListener("click",e=>{
  const im=e.target.closest&&e.target.closest("img[data-zoom]");
  if(im&&im.getAttribute("src")) openLightbox(im.getAttribute("src"));
});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ const lb=document.getElementById("lightbox"); if(lb){ sfxClose(); lb.remove(); } }
});
$("#btn-guide").addEventListener("click",()=>{ sfxOpen(); openGuide(); });
$("#btn-mute").addEventListener("click",()=>{
  state.muted=!state.muted;
  if(!state.muted) sfxToggle();
  const b=$("#btn-mute"); document.getElementById("sw-sound").classList.toggle("off",state.muted);
  b.setAttribute("aria-pressed",String(state.muted)); b.title=t(state.muted?"soundOff":"soundOn");
});
$("#btn-mute").title=t("soundOn");

(function boot(){
  const pl=PARAMS.get("lang");
  if(pl && ["en","sv","fi","et"].includes(pl)) lang=pl;
  renderStart();
  if(EMBEDDED) startGame();
})();
</script>
</body>
</html>
