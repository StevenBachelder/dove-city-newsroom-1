<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dove City Daily — Tip Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;700;900&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4F3EE; --paper-dark:#EAE8E0; --card:#FFFFFF;
  --ink:#20293A; --ink-soft:#5B6377; --line:#D9D6CC;
  --stamp-red:#B3352C; --stamp-red-dark:#8E2721;
  --verify:#147D74; --verify-dark:#0E5F58;
  --highlight:#F2C94C; --highlight-soft:#FBEEC6;
  --pop:#C77B32; --ad:#8a6d1a;
  --shadow:0 2px 10px rgba(32,41,58,.10); --radius:10px;
  --font-display:'Bitter',Georgia,serif;
  --font-body:'Source Sans 3',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:16px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
img,svg,video{display:block;max-width:100%}
.hidden{display:none !important}
.screen{min-height:100vh;display:flex;flex-direction:column}

/* ---------- start ---------- */
#screen-start{align-items:center;justify-content:center;padding:32px 20px;background:
  repeating-linear-gradient(0deg,transparent 0 34px,rgba(32,41,58,.028) 34px 35px),var(--paper)}
.start-card{max-width:660px;width:100%}
.masthead{font-family:var(--font-display);font-weight:900;letter-spacing:.5px;text-align:center;border-top:4px solid var(--ink);border-bottom:1.5px solid var(--ink);padding:14px 0 10px;position:relative}
.masthead .paper-name{font-size:clamp(32px,6vw,50px);line-height:1.05}
.masthead .paper-tag{font-family:var(--font-mono);font-weight:400;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);margin-top:6px}
.lang-pick{display:flex;justify-content:center;gap:8px;margin-top:14px}
.lang-btn{font-family:var(--font-mono);font-size:12px;letter-spacing:1px;border:1.5px solid var(--line);background:var(--card);border-radius:20px;padding:6px 14px}
.lang-btn.active{border-color:var(--ink);background:var(--ink);color:#fff}
.brief{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:20px;padding:26px 28px}
.brief h2{font-family:var(--font-display);font-size:22px;margin-bottom:10px}
.brief p{margin-bottom:12px}
.memo-from{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;border-bottom:1px dashed var(--line);padding-bottom:10px}
.rules{margin:10px 0 4px;list-style:none}
.rules li{padding:7px 0 7px 30px;position:relative}
.rules li::before{content:"";position:absolute;left:0;top:11px;width:16px;height:16px;border-radius:50%;border:2px solid var(--verify)}
.rules li.rule-red::before{border-color:var(--stamp-red)}
.btn-primary{display:inline-block;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:13px 26px;font-size:17px;font-weight:700;margin-top:16px;transition:transform .08s ease,background .15s}
.btn-primary:hover{background:#111827}
.btn-blue{background:#0265B7}
.btn-blue:hover{background:#014E8D}
.btn-primary:active{transform:scale(.97)}

/* ---------- newsroom ---------- */
#screen-news{display:grid;grid-template-rows:auto 1fr;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:16px;background:var(--ink);color:#fff;padding:10px 18px;flex-wrap:wrap}
.topbar .brand{font-family:var(--font-display);font-weight:900;font-size:19px;white-space:nowrap;cursor:pointer;border:none;background:none;color:#fff;padding:0}
.topbar .brand:hover{opacity:.8}
.topbar .dayclock{font-family:var(--font-mono);font-size:13px;color:#C7CDDB;white-space:nowrap}
.meters{display:flex;gap:16px;margin-left:auto;align-items:center;flex-wrap:wrap}
.meter{min-width:118px;cursor:pointer;border:none;background:none;padding:0;text-align:left}
.meter:hover .m-label{color:#fff}
.m-info{opacity:.75;font-size:10px;margin-left:4px}
.meter .m-label{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#C7CDDB;margin-bottom:3px}
.meter .m-track{height:8px;border-radius:4px;background:rgba(255,255,255,.18);overflow:hidden}
.meter .m-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.meter.cred .m-fill{background:var(--verify)}
.meter.pop .m-fill{background:var(--pop)}
.meter.src .m-fill{background:var(--highlight)}
.btn-guide,#lang-top{background:transparent;color:#C7CDDB;border:1px solid rgba(255,255,255,.35);border-radius:6px;padding:6px 10px;font-size:13px;font-family:var(--font-mono)}
.btn-guide:hover{color:#fff;border-color:#fff}
#lang-top:disabled{opacity:.45}

.workspace{display:grid;grid-template-columns:300px 1fr 360px;min-height:0}
.pane{overflow-y:auto;min-height:0}
.queue{background:var(--paper-dark);border-right:1px solid var(--line);padding:14px}
.queue h3,.tools h3{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px}
.tipcard{width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:11px 12px;margin-bottom:9px;box-shadow:var(--shadow);position:relative;transition:transform .1s;display:flex;gap:10px;align-items:flex-start}
.tipcard:hover{transform:translateX(3px)}
.tipcard .t-icon{width:30px;height:30px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--paper-dark)}
.tipcard .t-title{font-size:13.5px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tipcard .t-buzz{font-family:var(--font-mono);font-size:11px;color:var(--pop);margin-top:5px}
.tipcard.active{outline:2.5px solid var(--ink)}
.tipcard.done{opacity:.45;pointer-events:none}
.tipcard.done .t-done{position:absolute;right:9px;bottom:7px;font-family:var(--font-mono);font-size:10px;color:var(--verify)}

.desk{padding:18px 22px;display:flex;flex-direction:column;gap:16px}
.postcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.post-head{display:flex;align-items:flex-start;gap:12px;padding:15px 18px 8px}
.post-head .p-icon{width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--paper-dark)}
.post-head .p-title{font-family:var(--font-display);font-weight:900;font-size:20px;line-height:1.2}
.post-body{padding:2px 18px 12px;font-size:15.5px;color:var(--ink)}
.photo{margin:0 18px 14px;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--paper-dark)}
.photo img,.photo video{width:100%;max-height:340px;object-fit:cover}
.media-missing{padding:26px 14px;text-align:center;font-family:var(--font-mono);font-size:12px;color:var(--ink-soft)}
.board{background:var(--paper-dark);border:1px dashed var(--ink-soft);border-radius:var(--radius);padding:12px 14px;min-height:86px}
.board h4{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:4px;display:flex;justify-content:space-between}
.board-hint{font-size:12px;font-style:italic;color:var(--ink-soft);margin-bottom:9px}
.board .b-empty{font-size:13px;color:var(--ink-soft);font-style:italic}
.evcard{background:var(--card);border-left:4px solid var(--highlight);border-radius:6px;box-shadow:var(--shadow);padding:8px 10px;margin-bottom:7px;font-size:13px;display:flex;gap:9px;align-items:center;cursor:pointer;transition:transform .1s,box-shadow .1s}
.evcard:hover{transform:translateX(2px);box-shadow:0 3px 12px rgba(32,41,58,.18)}
.evcard .e-thumb{width:46px;height:46px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--paper-dark);border:1px solid var(--line);position:relative}
.evcard .e-thumb img,.evcard .e-thumb video{width:100%;height:100%;object-fit:cover;pointer-events:none}
.evcard .e-thumb .e-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;background:rgba(20,25,35,.35)}
.evcard .e-icon{width:30px;height:30px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--paper-dark)}
.evcard .e-icon img{width:100%;height:100%;object-fit:cover}
.evcard .e-main{flex:1;min-width:0}
.evcard .e-label{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ev-viewer.is-ad{outline:3px dashed var(--ad);outline-offset:-3px}
.ad-banner{background:#DB5F0C;color:#fff;font-family:var(--font-mono);font-size:13px;font-weight:700;letter-spacing:2.5px;text-align:center;padding:9px 12px;border-radius:8px;margin-bottom:12px}
.ev-head-row{display:flex;gap:11px;align-items:center;margin-bottom:8px}
.ev-src-icon{width:36px;height:36px;border-radius:8px;overflow:hidden;background:var(--paper-dark);flex-shrink:0;border:1px solid var(--line)}
.ev-src-icon img{width:100%;height:100%;object-fit:cover}
.ev-viewer .photo{margin:0 0 12px}
.ev-viewer .photo img,.ev-viewer .photo video{max-height:52vh;width:100%;object-fit:contain;background:var(--paper-dark)}
.evcard.is-ad{border-left-color:var(--ad)}
.evcard .e-src{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);display:block;margin-top:3px}
.evcard button{background:none;border:none;color:var(--stamp-red);font-size:15px;line-height:1}
.verdict{display:flex;gap:14px;align-items:center;justify-content:center;padding:6px 0 18px;flex-wrap:wrap}
.stamp{font-family:var(--font-display);font-weight:900;font-size:18px;letter-spacing:.5px;text-transform:uppercase;padding:15px 24px;border-radius:10px;border:3px solid;background:var(--card);transition:transform .08s ease,box-shadow .08s}
.stamp:hover{transform:rotate(-2deg) scale(1.04);box-shadow:var(--shadow)}
.stamp:active{transform:rotate(-2deg) scale(.94)}
.stamp:disabled{opacity:.4;cursor:not-allowed;transform:none}
.stamp.publish{color:#1FA84D;border-color:#1FA84D}
.stamp.flag{color:#D93025;border-color:#D93025}
.verdict-hint{font-size:12.5px;color:var(--ink-soft);text-align:center;margin-bottom:8px}
.empty-desk{color:var(--ink-soft);text-align:center;margin-top:60px;font-size:15px}
.empty-desk .big{font-size:40px;margin-bottom:8px}

/* tools */
.tools{background:var(--card);border-left:1px solid var(--line);padding:16px}
.toolbox{border:1px solid var(--line);border-radius:var(--radius);padding:13px;margin-bottom:14px}
.toolbox h4{font-family:var(--font-display);font-size:15px;margin-bottom:6px}
.tool-note{font-size:12px;color:var(--ink-soft);font-style:italic;margin-bottom:8px}
.termbtn{display:block;width:100%;text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:8px 11px;margin-bottom:6px;font-family:var(--font-mono);font-size:12.5px;transition:background .12s}
.termbtn:hover{background:var(--highlight-soft);border-color:var(--highlight)}
.termbtn.used{background:var(--paper-dark);color:var(--ink-soft)}
.result{border:1px solid var(--line);border-radius:8px;padding:10px 11px;margin-top:8px;background:var(--paper)}
.result.is-ad{border-style:dashed;border-color:var(--ad);background:#FBF7EA}
.r-top{display:flex;gap:8px;align-items:flex-start}
.r-icon{width:26px;height:26px;border-radius:5px;overflow:hidden;flex-shrink:0;background:var(--paper-dark)}
.result .r-title{font-weight:700;font-size:13.5px;line-height:1.3}
.result .r-date{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-soft);margin-top:2px}
.result .r-snip{font-size:13px;margin:6px 0 8px}
.ad-chip{display:inline-block;font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ad);border:1px solid var(--ad);border-radius:4px;padding:1px 6px;margin-bottom:4px}
.rel-chip{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-soft)}
.btn-ev{background:var(--highlight-soft);border:1px solid var(--highlight);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;white-space:pre-line;text-align:center;line-height:1.3}
.btn-ev:disabled{opacity:.5;cursor:default}
.imgres{border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:8px;background:var(--paper)}
.imgres .thumb{border:1px solid var(--line);border-radius:5px;overflow:hidden;margin-bottom:7px;background:var(--paper-dark)}
.imgres .thumb img,.imgres .thumb video{width:100%;max-height:150px;object-fit:cover}
.imgres .im-meta{font-size:12.5px}
.imgres .im-src{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);margin-top:3px}

#viewer-mount .overlay{z-index:80}

/* pinned-evidence review strip in the feedback modal */
.fb-ev-head{font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin:12px 0 7px}
.fb-ev{display:flex;flex-wrap:wrap;gap:8px}
.fb-evcard{display:flex;align-items:center;gap:8px;background:var(--paper);border:1.5px solid var(--line);border-radius:8px;padding:6px 9px 6px 6px;cursor:pointer;max-width:100%;transition:transform .1s,border-color .1s}
.fb-evcard:hover{transform:translateY(-1px);border-color:var(--ink-soft)}
.fb-evcard.backed{border-color:var(--verify)}
.fb-evcard.is-ad{border-color:var(--ad);border-style:dashed;background:#FBF7EA}
.fb-evcard .fe-thumb{width:38px;height:38px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--paper-dark);position:relative}
.fb-evcard .fe-thumb img,.fb-evcard .fe-thumb video{width:100%;height:100%;object-fit:cover;pointer-events:none}
.fb-evcard .fe-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;background:rgba(20,25,35,.35)}
.fb-evcard .fe-label{font-size:12.5px;line-height:1.25;max-width:150px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fb-evcard .fe-badge{font-size:13px;flex-shrink:0}

.fe-pts{font-family:var(--font-mono);font-size:12.5px;font-weight:600;flex-shrink:0;border-radius:5px;padding:2px 6px}
.fe-pts.pos{color:#0E5F58;background:#E2F1EE}
.fe-pts.neg{color:#8E2721;background:#F7E4E1}
.ev-pts{border:1.5px solid var(--line);border-radius:9px;padding:9px 12px;margin:10px 0 4px;background:var(--paper)}
.ev-pts .ep-num{font-family:var(--font-mono);font-size:20px;font-weight:700;margin-right:8px}
.ev-pts.pos .ep-num{color:#0E5F58}
.ev-pts.neg .ep-num{color:#8E2721}
.ev-pts .ep-label{font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft)}
.ev-pts .ep-why{font-size:13px;margin-top:5px}

/* meter nudge toast */
.nudge{position:fixed;top:64px;right:16px;z-index:60;background:var(--ink);color:#fff;border-radius:10px;
  padding:11px 15px;font-size:13.5px;max-width:270px;box-shadow:0 8px 26px rgba(0,0,0,.35);cursor:pointer;
  animation:nudgein .4s ease}
.nudge::before{content:"";position:absolute;top:-7px;right:34px;border:7px solid transparent;border-bottom-color:var(--ink);border-top:none}
@keyframes nudgein{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* modal / feedback */
.overlay{position:fixed;inset:0;background:rgba(24,30,44,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
.modal{background:var(--card);border-radius:14px;max-width:580px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 18px 60px rgba(0,0,0,.35)}
.modal-head{padding:18px 22px 0}
.verdict-banner{font-family:var(--font-display);font-weight:900;font-size:24px;padding:14px 22px;border-radius:10px;text-align:center;transform:rotate(-1.5deg);border:3px solid;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:9px;flex-wrap:wrap}
.v-total{font-family:inherit;font-size:inherit;font-weight:inherit;opacity:0;transform:translateX(-6px)}
.v-total.show{animation:totalpop .4s ease forwards}
@keyframes totalpop{to{opacity:1;transform:none}}
.verdict-banner.good{color:#FFFFFF;border-color:#157F3C;background:#1FA84D;text-shadow:0 1px 2px rgba(0,0,0,.25)}
.verdict-banner.bad{color:#FFFFFF;border-color:#A81E14;background:#D93025;text-shadow:0 1px 2px rgba(0,0,0,.25)}
.modal-body{padding:10px 22px 22px}
.modal-body p{margin-bottom:10px;font-size:14.5px}
.editor-quote{display:flex;gap:12px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px;margin:12px 0}
.editor-quote .avatar{width:42px;height:42px;border-radius:50%;background:#E5E0D3;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.editor-quote .q-name{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);margin-bottom:3px}
.editor-quote .q-text{font-size:14.5px;font-style:italic}
.techcard{border:2px solid var(--ink);border-radius:10px;overflow:hidden;margin:14px 0}
.techcard .tc-top{background:var(--ink);color:#fff;padding:9px 14px;font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase}
.techcard .tc-name{font-family:var(--font-display);font-weight:900;font-size:20px;padding:10px 14px 2px}
.techcard .tc-body{padding:4px 14px 12px;font-size:14px}
.delta-row{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
.delta{opacity:0;transform:translateY(4px);transition:opacity .25s,transform .25s}
.delta.show{opacity:1;transform:none}
.tally{display:flex;gap:14px;margin:6px 0 12px}
.tally .t-box{flex:1;background:var(--paper);border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.tally .t-name{font-family:var(--font-mono);font-size:14.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink)}
.tally .t-num{font-family:var(--font-mono);font-size:26px;font-weight:600;line-height:1.15;text-shadow:0 1px 2px rgba(0,0,0,.25)}
.tally .t-box.cred{background:#3A7B74}
.tally .t-box.pop{background:#BD7F41}
.tally .t-box.src{background:#EBCA62}
.tally .t-box.cred .t-num{color:#FFFFFF}
.tally .t-box.pop .t-num{color:#FFFFFF}
.tally .t-box.src .t-num{color:#FFFFFF}
.t-num.bump-up{animation:bumpup .18s ease}
.t-num.bump-down{animation:bumpdown .18s ease}
@keyframes bumpup{50%{transform:translateY(-3px) scale(1.08)}}
@keyframes bumpdown{50%{transform:translateY(3px) scale(0.94)}}
.delta{font-family:var(--font-mono);font-size:13px;border-radius:6px;padding:6px 10px;border:1px solid var(--line);background:var(--paper)}
.delta.up{color:var(--verify);border-color:var(--verify)}
.delta .d-arrow{font-size:18px;line-height:1;vertical-align:-2.5px;margin-right:5px;font-weight:700}
.delta.up .d-arrow{color:#1FA84D}
.delta.down .d-arrow{color:#D93025}
.delta.down{color:var(--stamp-red);border-color:var(--stamp-red)}
.ev-note{font-size:13px;padding:8px 11px;border-radius:8px;margin-top:6px}
.ev-note.good{background:#EAF5F3;border:1px solid var(--verify)}
.ev-note.bad{background:#FBF3E4;border:1px solid var(--pop)}
.ev-note.warn{background:#FBF7EA;border:1px solid var(--ad)}
.modal .btn-primary{width:100%;text-align:center}

/* front page + debrief */
#screen-front{align-items:center;padding:34px 20px;overflow-y:auto}
.frontpage{max-width:660px;width:100%;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);padding:30px 34px}
.fp-mast{font-family:var(--font-display);font-weight:900;font-size:32px;text-align:center;border-bottom:3px double var(--ink);padding-bottom:8px}
.fp-mast.clickable{cursor:pointer}
.fp-mast.clickable:hover{opacity:.75}
.fp-date{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;text-align:center;color:var(--ink-soft);padding:7px 0;border-bottom:1px solid var(--line);margin-bottom:16px}
.fp-head{font-family:var(--font-display);font-weight:900;font-size:26px;line-height:1.15;margin-bottom:10px}
.fp-sub{font-size:15px;color:var(--ink-soft);margin-bottom:14px}
.fp-item{border-top:1px solid var(--line);padding:11px 0;font-size:14.5px;display:flex;gap:8px;align-items:baseline}
.fp-tag{font-family:var(--font-mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:4px;flex-shrink:0}
.fp-tag.ok{background:#EAF5F3;color:var(--verify-dark)}
.fp-tag.err{background:#F9ECEA;color:var(--stamp-red-dark)}
#screen-end{align-items:center;padding:34px 20px;overflow-y:auto}
.debrief{max-width:720px;width:100%}
.ending{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 28px;margin-bottom:18px;text-align:center}
.ending h2{font-family:var(--font-display);font-size:28px;font-weight:900;margin:8px 0 10px}
.ending .end-emoji{font-size:44px}

.skill{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
.skill h4{font-family:var(--font-display);font-size:15px;margin-bottom:6px}
.skill .s-score{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);margin-top:5px}
.badges{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin:12px 0}
.badge-img{height:64px;width:auto;display:block;margin:0 auto 5px}
.badge.missed .badge-img{filter:grayscale(1);opacity:.38}
.earned-medal{height:72px;width:auto;display:block;animation:medalpop .5s cubic-bezier(.2,1.6,.4,1)}
.techcard.tc-award{margin-top:52px;overflow:visible;border-radius:12px}
.tca-head{background:#2A3750;border-radius:10px 10px 0 0;padding:54px 16px 14px;text-align:center;position:relative}
.tca-medalwrap{position:absolute;top:-48px;left:50%;transform:translateX(-50%);width:96px;height:96px;border-radius:50%;background:#2A3750;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.3)}
.tca-name{font-family:var(--font-display);font-weight:900;font-size:23px;color:#F2C94C;margin-bottom:7px}
.tca-line{font-family:var(--font-mono);font-size:11.5px;letter-spacing:2.5px;text-transform:uppercase;color:#FFFFFF;opacity:.95}
.tc-award .tc-name{margin-top:12px}
@keyframes medalpop{0%{transform:scale(.3) rotate(-12deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.guide-medal{height:56px;width:auto;flex-shrink:0}
.badge{font-family:var(--font-mono);font-size:12px;border:1.5px solid var(--ink);border-radius:20px;padding:6px 13px;background:var(--card)}
.badge.missed{opacity:.35;border-style:dashed}
.discipline{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 20px;margin-bottom:18px}
.discipline h3{font-family:var(--font-display);font-size:16px;margin-bottom:6px}
.discipline p{font-size:14px;margin-bottom:6px}
.discipline .disc-praise{background:#E2F1EE;border:1px solid var(--verify);border-radius:8px;padding:8px 11px}
.takeaways{background:var(--highlight-soft);border:1px solid var(--highlight);border-radius:var(--radius);padding:18px 22px;margin-bottom:18px}
.takeaways h3{font-family:var(--font-display);font-size:18px;margin-bottom:8px}
.takeaways p{font-size:14.5px;margin-bottom:8px}
.guide-list{padding:4px 22px 8px}
.guide-entry-medal{height:74px;width:auto;display:block;margin:2px auto 8px}
.guide-entry.locked .guide-entry-medal{filter:grayscale(1) contrast(0.65);opacity:.3}
.guide-entry{text-align:center;border-top:1px solid var(--line);padding:12px 0}
.guide-entry h4{text-align:center;font-family:var(--font-display);font-size:16px}
.guide-entry p{text-align:center;font-size:14px;margin-top:3px}
.guide-entry.locked,.guide-entry.locked h4{color:var(--ink-soft)}

@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation:none !important;transition:none !important}}
@media (max-width: 1020px){
  #screen-news{height:auto;overflow:visible}
  .workspace{grid-template-columns:1fr}
  .queue{border-right:none;border-bottom:1px solid var(--line)}
  .tools{border-left:none;border-top:1px solid var(--line)}
  .pane{overflow:visible}
  .skillgrid{grid-template-columns:1fr}
}
button:focus-visible{outline:3px solid var(--pop);outline-offset:2px}
</style>
</head>
<body>

<div class="screen" id="screen-start"></div>
<div class="screen hidden" id="screen-news">
  <div class="topbar">
    <button class="brand" id="brand-top" type="button"></button>
    <div class="dayclock" id="dayclock"></div>
    <div class="meters">
      <button class="meter cred" id="meter-cred" type="button">
        <div class="m-label"><span id="cred-label"></span><span id="cred-num">50</span></div>
        <div class="m-track"><div class="m-fill" id="cred-fill" style="width:50%"></div></div>
      </button>
      <button class="meter pop" id="meter-pop" type="button">
        <div class="m-label"><span id="pop-label"></span><span id="pop-num">20</span></div>
        <div class="m-track"><div class="m-fill" id="pop-fill" style="width:20%"></div></div>
      </button>
      <button class="meter src" id="meter-src" type="button">
        <div class="m-label"><span id="src-label"></span><span id="src-num">50</span></div>
        <div class="m-track"><div class="m-fill" id="src-fill" style="width:50%"></div></div>
      </button>
      <select id="lang-top"></select>
      <button class="btn-guide" id="btn-guide"></button>
    </div>
  </div>
  <div class="workspace">
    <div class="pane queue"><h3 id="queue-head"></h3><div id="queue-list"></div></div>
    <div class="pane desk" id="desk"></div>
    <div class="pane tools" id="tools"></div>
  </div>
</div>
<div class="screen hidden" id="screen-front"></div>
<div class="screen hidden" id="screen-end"></div>
<div id="modal-mount"></div>
<div id="viewer-mount"></div>

<script src="translation.js"></script>
<script src="translations_extra.js"></script>
<script src="cases.js"></script>
<script>
/* =====================================================================
   ENGINE — reads CASES (migrated data), languageData (your original
   4-language content) and extraStrings (new-mechanic strings).
   ===================================================================== */
const $ = s => document.querySelector(s);
const LANGS = [["en","English"],["sv","Svenska"],["fi","Suomi"],["et","Eesti"]];
let lang = "en";

function t(key){
  const ex = extraStrings[lang] || {}, exEn = extraStrings.en;
  if (ex[key] !== undefined) return ex[key];
  if (exEn[key] !== undefined) return exEn[key];
  const ld = (typeof languageData!=="undefined") ? languageData : {};
  if (ld[lang] && ld[lang][key] !== undefined) return ld[lang][key];
  if (ld.en && ld.en[key] !== undefined) return ld.en[key];
  return key;
}
function tf(key, vars){ let s=t(key); for(const k in (vars||{})) s=s.replace("{"+k+"}", vars[k]); return s; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function clamp(v){ return Math.max(0, Math.min(100, v)); }

const RELEVANCE = [ {key:"relevanceReasoning_1",score:8},{key:"relevanceReasoning_2",score:7},
                    {key:"relevanceReasoning_3",score:6},{key:"relevanceReasoning_4",score:4} ];
const TECH_LIST = ["manipulated","outofcontext","conspiracy","unverified","polarization","hoax","emotionaltrue","sponsored"];
const SKILL_MAP = { manipulated:"image", outofcontext:"image", emotionaltrue:"claims",
                    conspiracy:"claims", polarization:"claims", unverified:"source",
                    hoax:"source", genuine:"source" };
const MAX_PINS = 3;

/* ---------- tiny synth for score ticks (no audio files needed) ---------- */
let _ac=null;
function _audio(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC) return null;
    _ac=_ac||new AC();
    if(_ac.state==="suspended")_ac.resume();
    return _ac;
  }catch(e){return null;}
}
function blip(freq,dur,type,vol){
  const a=_audio(); if(!a) return;
  try{
    const o=a.createOscillator(), g=a.createGain();
    o.type=type||"square"; o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.09,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+(dur||0.05));
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime+(dur||0.05)+0.01);
  }catch(e){}
}
function tickUp(i){ blip(500*Math.pow(2,Math.min(i,14)/14), 0.045, "square", 0.085); }
function tickDown(i){ blip(340*Math.pow(2,-Math.min(i,14)/12), 0.06, "square", 0.10); }
function chordUp(){ blip(880,0.10,"triangle",0.10); setTimeout(()=>blip(1174,0.14,"triangle",0.10),70); }
function thudDown(){ blip(160,0.16,"triangle",0.13); setTimeout(()=>blip(120,0.2,"triangle",0.12),90); }

const state = {
  day:1, cred:50, pop:20, src:50, current:null, evidence:[], handled:{},
  usedText:{}, usedImg:{}, seenTech:new Set(), badges:new Set(), adPinned:false,
  unpins:0, upgrades:0, caseUnpinned:[], pinSum:0, pinCount:0,
  skills:{ source:{ok:0,n:0}, image:{ok:0,n:0}, claims:{ok:0,n:0}, evidence:{ok:0,n:0} }
};
const caseById = id => CASES.find(c=>c.id===id);
const dayCases = d => CASES.filter(c=>c.day===d);

/* ---------- media helpers (graceful if a file is missing) ---------- */
function mediaTag(src, type, cls){
  if(type==="video") return `<video src="${esc(src)}" controls muted playsinline preload="metadata" onerror="this.outerHTML='<div class=media-missing>🎬 '+this.getAttribute('src')+'</div>'"></video>`;
  return `<img src="${esc(src)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=media-missing>🖼 '+this.getAttribute('src')+'</div>'">`;
}
function iconTag(icons){
  const src = (icons&&icons[0]) || "";
  return src ? `<img src="${esc(src)}" alt="" onerror="this.style.display='none'">` : "";
}

/* ---------- screens ---------- */
function show(id){ ["screen-start","screen-news","screen-front","screen-end"].forEach(s=>$("#"+s).classList.add("hidden")); $("#"+id).classList.remove("hidden"); window.scrollTo(0,0); }

function renderStart(){
  $("#screen-start").innerHTML = `
  <div class="start-card">
    <div class="masthead">
      <div class="paper-name">${esc(t("brandName"))}</div>
      <div class="paper-tag">${esc(t("brandTag"))}</div>
    </div>
    <div class="lang-pick">${LANGS.map(([c,n])=>`<button class="lang-btn ${c===lang?"active":""}" data-lang="${c}">${n}</button>`).join("")}</div>
    <div class="brief">
      <div class="memo-from">${esc(t("memoFrom"))}</div>
      <h2>${esc(t("welcomeHead"))}</h2>
      <p>${esc(t("welcomeP1"))}</p>
      <p><strong>${esc(t("welcomeTrial"))}</strong></p>
      <ul class="rules">
        <li>${esc(t("rule1"))}</li>
        <li>${esc(t("rule2"))}</li>
        <li>${esc(t("rule3"))}</li>
        <li class="rule-red">${esc(t("rule4"))}</li>
      </ul>
      <p>${esc(t("welcomeP2"))}</p>
      <button class="btn-primary btn-blue" id="btn-start">${esc(t("startBtn"))}</button>
    </div>
  </div>`;
  document.querySelectorAll(".lang-btn").forEach(b=>b.addEventListener("click",()=>{ lang=b.dataset.lang; renderStart(); }));
  $("#btn-start").addEventListener("click", startGame);
}

function goHome(){
  if(confirm(t("homeConfirm"))) location.reload();
}
function startGame(){
  $("#brand-top").textContent = t("brandName");
  $("#brand-top").title = t("homeTitle");
  $("#brand-top").onclick = goHome;
  $("#cred-label").innerHTML = esc(t("credibility"))+'<span class="m-info">ⓘ</span>';
  $("#pop-label").innerHTML = esc(t("popularity"))+'<span class="m-info">ⓘ</span>';
  $("#src-label").innerHTML = esc(t("srcLabel"))+'<span class="m-info">ⓘ</span>';
  $("#meter-cred").title = $("#meter-pop").title = $("#meter-src").title = t("meterHint");
  $("#meter-cred").onclick = $("#meter-pop").onclick = $("#meter-src").onclick = openMeterInfo;
  $("#btn-guide").textContent = t("fieldGuideBtn");
  const sel = $("#lang-top");
  sel.innerHTML = LANGS.map(([c,n])=>`<option value="${c}" ${c===lang?"selected":""}>${n}</option>`).join("");
  sel.onchange = ()=>{ lang = sel.value; startGame(); if(!state.current){ deskIdle(); toolsIdle(); } };
  $("#queue-head").textContent = t("incomingTips");
  $("#dayclock").textContent = t("dayLabel")+" "+state.day+" "+t("dayOf");
  renderQueue();
  if(!state.current){ deskIdle(); toolsIdle(); }
  show("screen-news");
}
function deskIdle(msg){ $("#desk").innerHTML = `<div class="empty-desk"><div class="big">🕊️</div>${esc(msg||t("emptyDesk"))}</div>`; }
function toolsIdle(){ $("#tools").innerHTML = `<h3>${esc(t("toolsHead"))}</h3><div class="tool-note">${esc(t("toolsLocked"))}</div>`; }

function setMeters(dc,dp,ds){
  state.cred=clamp(state.cred+dc); state.pop=clamp(state.pop+dp); state.src=clamp(state.src+(ds||0));
  $("#cred-num").textContent=state.cred; $("#pop-num").textContent=state.pop; $("#src-num").textContent=state.src;
  $("#cred-fill").style.width=state.cred+"%"; $("#pop-fill").style.width=state.pop+"%"; $("#src-fill").style.width=state.src+"%";
}

function renderQueue(){
  const list=$("#queue-list"); list.innerHTML="";
  dayCases(state.day).forEach(c=>{
    const done=state.handled[c.id];
    const b=document.createElement("button");
    b.className="tipcard"+(done?" done":"")+(state.current===c.id?" active":"");
    b.innerHTML=`<div class="t-icon">${iconTag(c.icons)}</div>
      <div><div class="t-title">${esc(t(c.title))}</div>
      <div class="t-buzz">🔥 ${esc(t("buzzLabel"))} ${"▮".repeat(Math.round(c.buzz/4))}${"▯".repeat(Math.max(0,4-Math.round(c.buzz/4)))}</div></div>
      ${done?`<span class="t-done">${esc(t("handledTag"))}</span>`:""}`;
    if(!done) b.addEventListener("click",()=>openCase(c.id));
    list.appendChild(b);
  });
  $("#dayclock").textContent=t("dayLabel")+" "+state.day+" "+t("dayOf");
}

/* ---------- case desk ---------- */
function openCase(id){
  if(state.handled[id]) return;
  state.current=id; state.evidence=[]; state.caseUnpinned=[]; state.usedText[id]=state.usedText[id]||false; state.usedImg[id]=state.usedImg[id]||false;
  $("#lang-top").disabled = true;
  renderQueue();
  const c=caseById(id);
  const desc=t(c.description);
  $("#desk").innerHTML=`
    <div class="postcard">
      <div class="post-head">
        <div class="p-icon">${iconTag(c.icons)}</div>
        <div class="p-title">${esc(t(c.title))}</div>
      </div>
      ${desc.trim()?`<div class="post-body">${esc(desc)}</div>`:""}
      <div class="photo">${mediaTag(c.image,"img")}</div>
    </div>
    <div class="board">
      <h4><span>${esc(t("boardHead"))}</span><span id="pin-count">${esc(t("evidenceUsed"))} 0/${MAX_PINS}</span></h4>
      <div class="board-hint">${esc(t("boardHint"))}</div>
      <div id="board-items"></div>
    </div>
    <div>
      <div class="verdict-hint" id="verdict-hint"></div>
      <div class="verdict">
        <button class="stamp publish" id="stamp-publish">${esc(t("publishStamp"))}</button>
        <button class="stamp flag" id="stamp-flag">${esc(t("flagStamp"))}</button>
      </div>
    </div>`;
  $("#stamp-publish").addEventListener("click",()=>verdict("publish"));
  $("#stamp-flag").addEventListener("click",()=>verdict("flag"));
  renderTools(c); renderBoard();
}

function gateReason(c){
  if(!state.evidence.length) return t("hintPin");
  if(c.needImageTool && !state.usedImg[c.id]) return t("hintNeedImage");
  if(c.needTextTool && !state.usedText[c.id]) return t("hintNeedText");
  return null;
}
function renderBoard(){
  const c=caseById(state.current); if(!c) return;
  const el=$("#board-items");
  el.innerHTML = state.evidence.length ? state.evidence.map((e,i)=>{
    const lead = (e.kind==="img")
      ? `<div class="e-thumb"><img src="${esc(e.mediaSrc)}" alt="" onerror="this.style.display='none'"></div>`
      : (e.kind==="video")
      ? `<div class="e-thumb"><video src="${esc(e.mediaSrc)}" muted preload="metadata"></video><div class="e-play">▶</div></div>`
      : `<div class="e-icon">${e.icon?`<img src="${esc(e.icon)}" alt="" onerror="this.style.display='none'">`:"🔍"}</div>`;
    return `<div class="evcard ${e.isAd?"is-ad":""}" data-view="${i}" role="button" tabindex="0">
      ${lead}
      <div class="e-main"><div class="e-label">${esc(e.label)}</div>${e.isAd?`<span class="ad-chip">${esc(t("sponsoredTag"))}</span>`:""}<span class="e-src">${esc(e.date||"")}</span></div>
      <button title="✖" data-i="${i}">✖</button></div>`;
  }).join("")
    : `<div class="b-empty">${esc(t("boardEmpty"))}</div>`;
  el.querySelectorAll("button[data-i]").forEach(b=>b.addEventListener("click",ev=>{
    ev.stopPropagation();
    const removed=state.evidence.splice(+b.dataset.i,1)[0];
    if(removed){ state.unpins++; state.caseUnpinned.push(removed.pts||0); }
    renderBoard();
  }));
  el.querySelectorAll(".evcard").forEach(card=>{
    const open=()=>openEvidence(+card.dataset.view);
    card.addEventListener("click",open);
    card.addEventListener("keydown",ev=>{if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();open();}});
  });
  $("#pin-count").textContent = t("evidenceUsed")+" "+state.evidence.length+"/"+MAX_PINS;
  const reason=gateReason(c);
  $("#stamp-publish").disabled=!!reason; $("#stamp-flag").disabled=!!reason;
  $("#verdict-hint").textContent = reason || t("hintReady");
}

/* ---------- tools ---------- */
function renderTools(c){
  $("#tools").innerHTML=`
    <h3>${esc(t("toolsHead"))}</h3>
    <div class="toolbox">
      <h4>${esc(t("textSearchHead"))}</h4>
      <div class="tool-note">${esc(t("textSearchNote"))}</div>
      ${c.searchTerms.map((k,i)=>`<button class="termbtn" data-q="${i}">🔍 ${esc(t(k))}</button><div id="results-${i}"></div>`).join("")}
    </div>
    <div class="toolbox">
      <h4>${esc(t("imageSearchHead"))}</h4>
      <div class="tool-note">${esc(t("imageSearchNote"))}</div>
      <button class="termbtn" id="btn-imgsearch">🖼️ ${esc(t("searchImageBtn"))}</button>
      <div id="results-img"></div>
    </div>`;
  document.querySelectorAll(".termbtn[data-q]").forEach(btn=>btn.addEventListener("click",()=>{
    btn.classList.add("used"); state.usedText[c.id]=true; renderTextResults(c,+btn.dataset.q); renderBoard();
  }));
  $("#btn-imgsearch").addEventListener("click",()=>{
    $("#btn-imgsearch").classList.add("used"); state.usedImg[c.id]=true; renderImgResults(c); renderBoard();
  });
}
/* All search terms lead to the case's result set (as in the original game);
   results render under whichever term the player clicked. */
function renderTextResults(c,qi){
  for(let i=0;i<c.searchTerms.length;i++){ if(i!==qi){ const o=$("#results-"+i); o.innerHTML=""; delete o.dataset.done; } }
  const target=$("#results-"+qi); if(target.dataset.done) return; target.dataset.done="1";
  target.innerHTML=c.searchResults.map((r,j)=>{
    const rel = r.isAd ? {key:"relevanceReasoning_ad",score:2} : RELEVANCE[r.rIdx||0];
    return `<div class="result ${r.isAd?"is-ad":""}">
      ${r.isAd?`<span class="ad-chip">${esc(t("sponsoredTag"))}</span>`:""}
      <div class="r-top"><div class="r-icon">${iconTag(r.icons)}</div>
        <div><div class="r-title">${esc(t(r.title))}</div>
        ${r.date?`<div class="r-date">${esc(t(r.date))}</div>`:""}</div></div>
      <div class="r-snip">${esc(t(r.description))}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <span class="rel-chip" title="${esc(t(rel.key))}">${esc(t("relevanceScore"))} ${rel.score}/10</span>
        <button class="btn-ev" data-ev="t-${j}">${esc(t("pinBtn"))}</button>
      </div></div>`;
  }).join("");
  target.querySelectorAll(".btn-ev").forEach(b=>{
    const j=+b.dataset.ev.split("-")[1], r=c.searchResults[j];
    if(state.evidence.some(e=>e.key==="t"+j)){ b.disabled=true; b.textContent=t("pinnedBtn"); }
    b.addEventListener("click",()=>{
      if(pin({kind:"text", label:t(r.title), desc:t(r.description), date:(r.date?t(r.date):""), icon:(r.icons&&r.icons[0])||"", supports:r.supports===true, isAd:r.isAd, rIdx:r.rIdx||0, key:"t"+j}))
        { b.disabled=true; b.textContent=t("pinnedBtn"); }
    });
  });
}
function renderImgResults(c){
  const box=$("#results-img"); if(box.dataset.done) return; box.dataset.done="1";
  box.innerHTML=c.imageResults.map((r,j)=>`
    <div class="imgres">
      <div class="thumb">${mediaTag(r.src,r.type)}</div>
      <div class="im-meta">${esc(t(r.location))}
        <div class="im-src">${esc(t(r.date))}</div>
        <button class="btn-ev" style="margin-top:6px" data-ev="i-${j}">${esc(t("pinBtn"))}</button>
      </div></div>`).join("");
  box.querySelectorAll(".btn-ev").forEach(b=>b.addEventListener("click",()=>{
    const j=+b.dataset.ev.split("-")[1], r=c.imageResults[j];
    if(pin({kind:(r.type==="video"?"video":"img"), label:String(t(r.location)), date:t(r.date), mediaSrc:r.src, icon:(r.icons&&r.icons[0])||"", supports:r.supports===true, isAd:false, key:"i"+j}))
      { b.disabled=true; b.textContent=t("pinnedBtn"); }
  }));
}
/* per-pin SOURCE value: authority of the source decides the reward */
function calcPts(ev){
  if(ev.isAd) return -4;
  if(ev.supports){
    if(ev.kind==="img"||ev.kind==="video") return 3;          // original context found visually
    return [4,3,2,2][Math.min(Math.max(ev.rIdx||0,0),3)];     // official → weaker outlet
  }
  return -1;                                                   // pinned, but beside the point
}
function pin(ev){
  if(state.evidence.some(e=>e.key===ev.key)) return false;
  ev.pts=calcPts(ev);
  // swap detection: replacing a previously unpinned, weaker source with a stronger one
  const weaker=state.caseUnpinned.filter(p=>p<ev.pts);
  if(weaker.length){
    const consumed=Math.min(...weaker);
    state.caseUnpinned.splice(state.caseUnpinned.indexOf(consumed),1);
    state.upgrades++;
  }
  if(state.evidence.length>=MAX_PINS){ alert(t("evidenceLimitReached")+" ("+MAX_PINS+"). "+t("qualityOverQuantity")); return false; }
  if(ev.isAd) state.adPinned=true;
  state.evidence.push(ev); renderBoard(); return true;
}

/* ---------- verdict ---------- */
function verdict(choice){
  const c=caseById(state.current);
  if(!c || state.handled[c.id]) return;
  const correct=(choice==="publish")===c.truth;
  const evOk=state.evidence.some(e=>e.supports);
  const adUsed=state.evidence.some(e=>e.isAd);
  const before={cred:state.cred,pop:state.pop,src:state.src};
  let events=[], dc=0, dp=0;
  if(correct){
    if(c.truth){ dc+=8; dp+=c.buzz;
      events.push({m:"cred",amt:8,label:tf("dCredPlusVerified",{n:8})},{m:"pop",amt:c.buzz,label:tf("dPopPlusLoved",{n:c.buzz})}); }
    else { dc+=12; dp+=2;
      events.push({m:"cred",amt:12,label:tf("dCredPlusStopped",{n:12})},{m:"pop",amt:2,label:tf("dPopPlusTrust",{n:2})}); }
  } else {
    if(!c.truth){ dp+=c.buzz; dc-=18; const back=Math.round(c.buzz*1.5); dp-=back;
      events.push({m:"pop",amt:c.buzz,label:tf("dPopPlusViral",{n:c.buzz})},{m:"cred",amt:-18,label:tf("dCredMinusCorrection",{n:18})},{m:"pop",amt:-back,label:tf("dPopMinusFooled",{n:back})}); }
    else { dc-=8; dp-=6;
      events.push({m:"cred",amt:-8,label:tf("dCredMinusBuried",{n:8})},{m:"pop",amt:-6,label:tf("dPopMinusScooped",{n:6})}); }
  }
  const ds=state.evidence.reduce((sum,e)=>sum+(e.pts||0),0);
  state.evidence.forEach(e=>{state.pinSum+=(e.pts||0); state.pinCount++;});
  if(ds>0) events.push({m:"src",amt:ds,label:tf("dSrcPlusBacked",{n:ds})});
  else if(ds<0) events.push({m:"src",amt:ds,label:tf(adUsed?"dSrcMinusAd":"dSrcMinusWeak",{n:Math.abs(ds)})});
  setMeters(dc,dp,ds);
  state.handled[c.id]={choice,correct,evOk};
  const sk=SKILL_MAP[c.technique]||"source";
  state.skills[sk].n++; if(correct) state.skills[sk].ok++;
  state.skills.evidence.n++; if(evOk) state.skills.evidence.ok++;
  if(c.technique!=="genuine"){ state.seenTech.add(c.technique); if(correct) state.badges.add(c.technique); }
  if(adUsed) state.seenTech.add("sponsored");
  feedback(c,choice,correct,evOk,adUsed,events,before);
}

function feedback(c,choice,correct,evOk,adUsed,events,before){
  const drKey="decisionReasoning_"+c.id+"_"+(correct?"correct":"incorrect")+"_"+choice;
  const dr=t(drKey); const drText = (dr===drKey)?"":dr;
  const isTech=c.technique!=="genuine";
  const mount=$("#modal-mount");
  mount.innerHTML=`
  <div class="overlay"><div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head"><div class="verdict-banner ${correct?"good":"bad"}"><span>${esc(correct?t("rightCall"):t("wrongCall"))}</span><span class="v-total" id="v-total">${(()=>{const n=events.reduce((s,e)=>s+e.amt,0);return (n>0?"+":"")+n;})()}</span></div></div>
    <div class="modal-body">
      ${drText?`<p>${esc(drText)}</p>`:""}
      <div class="tally">
        <div class="t-box cred"><div class="t-name">${esc(t("credibility"))}</div><div class="t-num" id="tally-cred">${before.cred}</div></div>
        <div class="t-box pop"><div class="t-name">${esc(t("popularity"))}</div><div class="t-num" id="tally-pop">${before.pop}</div></div>
        <div class="t-box src"><div class="t-name">${esc(t("srcLabel"))}</div><div class="t-num" id="tally-src">${before.src}</div></div>
      </div>
      <div class="delta-row">${events.map((e,i)=>`<span class="delta ${e.amt>0?"up":"down"}" data-ev="${i}"><span class="d-arrow">${e.amt>0?"▲":"▼"}</span>${esc(e.label)}</span>`).join("")}</div>
      ${evOk?`<div class="ev-note good">${esc(t("evGood"))}</div>`:`<div class="ev-note bad">${esc(t("evBad"))}</div>`}
      ${adUsed?`<div class="ev-note warn">${esc(t("evAdWarn"))}</div>`:""}
      ${state.evidence.length?`<div class="fb-ev-head">${esc(t("evReviewHead"))}</div>
      <div class="fb-ev">${state.evidence.map((e,i)=>{
        const th = e.kind==="img" ? `<div class="fe-thumb"><img src="${esc(e.mediaSrc)}" alt="" onerror="this.style.display='none'"></div>`
                 : e.kind==="video" ? `<div class="fe-thumb"><video src="${esc(e.mediaSrc)}" muted preload="metadata"></video><div class="fe-play">▶</div></div>`
                 : `<div class="fe-thumb">${e.icon?`<img src="${esc(e.icon)}" alt="" onerror="this.style.display='none'">`:""}</div>`;
        const pts=e.pts||0;
        const badge = `${e.isAd?`<span class="fe-badge" title="${esc(t("sponsoredTag"))}">⚠️</span>`:""}<span class="fe-pts ${pts>0?"pos":"neg"}">${pts>0?"+":""}${pts}</span>`;
        return `<div class="fb-evcard ${pts>0?"backed":""} ${e.isAd?"is-ad":""}" data-fbev="${i}" role="button" tabindex="0">${th}<span class="fe-label">${esc(e.label)}</span>${badge}</div>`;
      }).join("")}</div>`:""}
      <div class="editor-quote"><div class="avatar">🕊️</div>
        <div><div class="q-name">${esc(t("veraName"))} · ${esc(t("veraTitle"))}</div>
        <div class="q-text">“${esc(t("vera_"+c.technique+"_"+(correct?"ok":"no")))}”</div></div></div>
      <div class="techcard ${(isTech&&correct)?"tc-award":""}">
        ${(isTech&&correct)?`<div class="tca-head">
          <div class="tca-medalwrap"><img class="earned-medal" src="Badges/badge_${c.technique}.png" alt="" onerror="this.style.display='none'"></div>
          <div class="tca-name">${esc(t("tq_"+c.technique+"_name"))}</div>
          <div class="tca-line">${esc(t("techniqueTopBadge"))}</div>
        </div>`:`<div class="tc-top">${esc(isTech?t("techniqueTop"):t("noTrickTop"))}</div>`}
        <div class="tc-name">${esc(isTech?t("tq_"+c.technique+"_name"):t("genuineName"))}</div>
        <div class="tc-body">${esc(isTech?t("tq_"+c.technique+"_body"):t("tq_genuine_body"))}</div>
      </div>
      <button class="btn-primary btn-blue" id="btn-next">${esc(t("nextBtn"))}</button>
    </div></div></div>`;
  animateTally(events,before);
  mount.querySelectorAll(".fb-evcard").forEach(card=>{
    const open=()=>openEvidence(+card.dataset.fbev);
    card.addEventListener("click",open);
    card.addEventListener("keydown",ev=>{if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();open();}});
  });
  $("#btn-next").addEventListener("click",()=>{
    mount.innerHTML=""; state.current=null; $("#lang-top").disabled=false;
    if(!state.meterNudged){
      state.meterNudged=true;
      const n=document.createElement("div"); n.className="nudge"; n.setAttribute("role","status");
      n.textContent=t("meterNudge");
      n.addEventListener("click",()=>{n.remove();openMeterInfo();});
      document.body.appendChild(n);
      setTimeout(()=>{if(n.parentNode)n.remove();},9000);
    }
    const remaining=dayCases(state.day).filter(x=>!state.handled[x.id]);
    if(remaining.length){
      deskIdle(remaining.length===1?t("tipsLeftOne"):tf("tipsLeftMany",{n:remaining.length}));
      toolsIdle(); renderQueue();
    } else frontPage();
  });
}

/* evidence viewer: click a pinned card to re-inspect it */
function evPtsReason(e){
  if(e.isAd) return t("sponsoredResultWarning");
  if(e.supports && (e.kind==="img"||e.kind==="video")) return t("srcImgStrong");
  if(e.supports) return t("relevanceReasoning_"+(Math.min(Math.max(e.rIdx||0,0),3)+1));
  if(e.kind==="img"||e.kind==="video") return t("srcImgWeak");
  return t("srcTextWeak");
}
function openEvidence(i){
  const e=state.evidence[i]; if(!e) return;
  const mount=$("#viewer-mount");
  const media = e.kind==="img" ? `<div class="photo">${mediaTag(e.mediaSrc,"img")}</div>`
              : e.kind==="video" ? `<div class="photo">${mediaTag(e.mediaSrc,"video")}</div>` : "";
  mount.innerHTML=`<div class="overlay" id="ev-ov"><div class="modal ev-viewer ${e.isAd?"is-ad":""}">
    <div class="modal-body" style="padding-top:20px">
      ${e.isAd?`<div class="ad-banner">⚠️ ${esc(t("sponsoredTag").toUpperCase())}</div>`:""}
      ${media}
      <div class="ev-head-row">
        ${e.icon?`<div class="ev-src-icon"><img src="${esc(e.icon)}" alt="" onerror="this.style.display='none'"></div>`:""}
        <p style="font-weight:700;font-size:15.5px;margin:0">${esc(e.label)}</p>
      </div>
      ${e.desc?`<p>${esc(e.desc)}</p>`:""}
      <p class="e-src" style="font-family:var(--font-mono);font-size:12px;color:var(--ink-soft)">${esc(e.date||"")}</p>
      <div class="ev-pts ${ (e.pts||0)>0?"pos":"neg"}">
        <span class="ep-num">${(e.pts||0)>0?"+":""}${e.pts||0}</span>
        <span class="ep-label">${esc(t("srcValLabel"))}</span>
        <div class="ep-why">${esc(evPtsReason(e))}</div>
      </div>
      ${e.isAd?`<div class="ev-note warn">${esc(t("evAdWarn"))}</div>`:""}
      <button class="btn-primary" id="ev-close" style="margin-top:12px">${esc(t("close"))}</button>
    </div></div></div>`;
  $("#ev-close").addEventListener("click",()=>mount.innerHTML="");
  $("#ev-ov").addEventListener("click",ev=>{if(ev.target.id==="ev-ov")mount.innerHTML="";});
}

/* animated score tally: plays events in narrative order with rising/falling blips */
function animateTally(events,before){
  const vals={cred:before.cred,pop:before.pop,src:before.src};
  const el=m=>document.getElementById("tally-"+m);
  let ev=0;
  function runEvent(){
    if(!el("cred")) return;                     // modal closed — stop silently
    if(ev>=events.length){
      const net=events.reduce((s,e)=>s+e.amt,0);
      setTimeout(()=>{                        // suspense beat before the reveal
        if(!el("cred")) return;               // modal closed meanwhile
        (net>=0?chordUp:thudDown)();
        const tot=document.getElementById("v-total"); if(tot) tot.classList.add("show");
      },650);
      return;
    }
    const e=events[ev++];
    const chip=document.querySelector('.delta[data-ev="'+(ev-1)+'"]');
    if(chip) chip.classList.add("show");
    const dir=e.amt>0?1:-1, total=Math.abs(e.amt);
    const stepSize=total>16?2:1, stepMs=total>16?55:65;
    let done=0, i=0;
    (function step(){
      if(!el(e.m)) return;                      // modal closed
      const inc=Math.min(stepSize,total-done);
      done+=inc;
      vals[e.m]=clamp(vals[e.m]+dir*inc);
      const node=el(e.m);
      node.textContent=vals[e.m];
      node.classList.remove("bump-up","bump-down"); void node.offsetWidth;
      node.classList.add(dir>0?"bump-up":"bump-down");
      dir>0?tickUp(i):tickDown(i); i++;
      if(done<total) setTimeout(step,stepMs);
      else setTimeout(runEvent,320);            // beat between events
    })();
  }
  setTimeout(runEvent,420);                     // let the banner land first
}

/* ---------- front page + debrief ---------- */
function frontPage(){
  const cs=dayCases(state.day);
  const wrongPub=cs.some(c=>!state.handled[c.id].correct&&state.handled[c.id].choice==="publish");
  const anyWrong=cs.some(c=>!state.handled[c.id].correct);
  const head=!anyWrong?t("fpClean"):wrongPub?t("fpCorrections"):t("fpScooped");
  const sub=!anyWrong?t("fpCleanSub"):wrongPub?t("fpCorrectionsSub"):t("fpScoopedSub");
  $("#screen-front").innerHTML=`
    <div class="frontpage">
      <div class="fp-mast clickable" id="fp-home" role="button" tabindex="0" title="${esc(t("homeTitle"))}">${esc(t("brandName"))}</div>
      <div class="fp-date">${esc(tf("fpDate",{n:state.day}))}</div>
      <div class="fp-head">${esc(head)}</div>
      <div class="fp-sub">${esc(sub)} ${esc(tf("fpMeters",{c:state.cred,p:state.pop}))}</div>
      ${cs.map(c=>{const h=state.handled[c.id];return `<div class="fp-item"><span class="fp-tag ${h.correct?"ok":"err"}">${esc(h.correct?t("rightCall"):t("wrongCall"))}</span><span>${esc(t(c.title))}</span></div>`;}).join("")}
      <button class="btn-primary btn-blue" id="btn-nextday">${esc(state.day<3?tf("startDayBtn",{n:state.day+1}):t("finalReviewBtn"))}</button>
    </div>`;
  show("screen-front");
  $("#fp-home").addEventListener("click",goHome);
  $("#fp-home").addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" ")goHome();});
  $("#btn-nextday").addEventListener("click",()=>{
    if(state.cred<=0){ debrief(true); return; }
    if(state.day<3){ state.day++; renderQueue(); deskIdle(tf("newDayDesk",{n:state.day})); toolsIdle(); show("screen-news"); }
    else debrief(false);
  });
}

function debrief(fired){
  const total=CASES.length, right=Object.values(state.handled).filter(h=>h.correct).length;
  let tier;
  if(fired||state.cred<25) tier={e:"📦",t:t("endFiredT"),d:t("endFiredD")};
  else if(right>=total-1&&state.cred>=80) tier={e:"🏆",t:t("endSeniorT"),d:t("endSeniorD")};
  else if(state.cred>=60) tier={e:"🗞️",t:t("endStaffT"),d:t("endStaffD")};
  else tier={e:"⏳",t:t("endExtendT"),d:t("endExtendD")};
  const meta={source:["skillSource","skillSourceTip"],image:["skillImage","skillImageTip"],claims:["skillClaims","skillClaimsTip"],evidence:["skillEvidence","skillEvidenceTip"]};
  const skills=Object.entries(state.skills).map(([k,v])=>{
    const pct=v.n?Math.round(100*v.ok/v.n):0;
    return `<div class="skill"><h4>${esc(t(meta[k][0]))}</h4>
      <div style="height:8px;border-radius:4px;background:var(--paper-dark)"><div style="height:100%;width:${pct}%;border-radius:4px;background:${pct>=67?"var(--verify)":pct>=34?"var(--pop)":"var(--stamp-red)"}"></div></div>
      <div class="s-score">${v.ok}/${v.n} · ${esc(t(meta[k][1]))}</div></div>`;}).join("");
  let badgeHtml=TECH_LIST.filter(k=>k!=="sponsored").map(k=>
    `<span class="badge ${state.badges.has(k)?"":"missed"}"><img class="badge-img" src="Badges/badge_${k}.png" alt="" onerror="this.style.display='none'">${esc(t("tq_"+k+"_name"))}</span>`).join("");
  badgeHtml+=`<span class="badge ${state.adPinned?"missed":""}"><img class="badge-img" src="Badges/badge_adspotter.png" alt="" onerror="this.style.display='none'">${esc(t("badgeAds"))}</span>`;
  $("#screen-end").innerHTML=`
    <div class="debrief">
      <div class="ending"><div class="end-emoji">${tier.e}</div><h2>${esc(tier.t)}</h2><p>${esc(tier.d)}</p>
        <p style="margin-top:10px;font-family:var(--font-mono);font-size:13px;color:var(--ink-soft)">${esc(tf("statsLine",{r:right,t:total,c:state.cred,p:state.pop}))}</p>
        <div class="badges">${badgeHtml}</div></div>
      <div class="skillgrid">${skills}</div>
      <div class="discipline">
        <h3>${esc(t("swapTitle"))}</h3>
        <p>${esc(tf("avgPinLine",{v:(state.pinCount?((state.pinSum/state.pinCount>=0?"+":"")+(state.pinSum/state.pinCount).toFixed(1)):"—")}))}</p>
        ${state.upgrades>0
          ? `<p class="disc-praise">🔁 ${esc(state.upgrades===1?t("swapPraiseOne"):tf("swapPraiseMany",{n:state.upgrades}))}</p>`
          : state.unpins>0
          ? `<p>${esc(state.unpins===1?t("swapNeutralOne"):tf("swapNeutralMany",{n:state.unpins}))}</p>`
          : ``}
      </div>
      <div class="takeaways"><h3>${esc(t("takeHead"))}</h3>
        <p><strong>1.</strong> ${esc(t("take1"))}</p><p><strong>2.</strong> ${esc(t("take2"))}</p>
        <p><strong>3.</strong> ${esc(t("take3"))}</p><p><strong>4.</strong> ${esc(t("take4"))}</p>
        <p><strong>5.</strong> ${esc(t("take5"))}</p></div>
      <div style="text-align:center"><button class="btn-primary btn-blue" id="btn-replay">${esc(t("replayBtn"))}</button></div>
    </div>`;
  show("screen-end");
  $("#btn-replay").addEventListener("click",()=>location.reload());
}

/* ---------- field guide ---------- */
function openGuide(){
  const entries=TECH_LIST.map(k=>{
    const seen=state.seenTech.has(k);
    const medal = (k==="sponsored") ? "badge_adspotter" : (k==="genuine") ? "badge_generic" : "badge_"+k;
    return `<div class="guide-entry ${seen?"":"locked"}">
      <img class="guide-entry-medal" src="Badges/${medal}.png" alt="" onerror="this.style.display='none'">
      <h4>${esc(seen?t("tq_"+k+"_name"):t("guideLockedName"))}</h4>
      <p>${esc(seen?t("tq_"+k+"_body"):t("guideLockedBody"))}</p></div>`;}).join("");
  const mount=$("#modal-mount");
  mount.innerHTML=`<div class="overlay" id="g-ov"><div class="modal">
    <div class="modal-head"><h2 style="font-family:var(--font-display);font-size:22px;padding-bottom:4px">${esc(t("guideTitle"))}</h2>
    <div style="display:flex;gap:12px;align-items:center"><img class="guide-medal" src="Badges/badge_generic.png" alt="" onerror="this.style.display='none'"><p style="font-size:13.5px;color:var(--ink-soft);margin:0">${esc(t("guideSub"))}</p></div></div>
    <div class="guide-list">${entries}</div>
    <div class="modal-body"><button class="btn-primary" id="g-close">${esc(t("backToDesk"))}</button></div></div></div>`;
  $("#g-close").addEventListener("click",()=>mount.innerHTML="");
  $("#g-ov").addEventListener("click",e=>{if(e.target.id==="g-ov")mount.innerHTML="";});
}
function openMeterInfo(){
  const mount=$("#modal-mount");
  mount.innerHTML=`<div class="overlay" id="mi-ov"><div class="modal">
    <div class="modal-head"><h2 style="font-family:var(--font-display);font-size:22px;padding-bottom:2px;white-space:pre-line">${esc(t("meterInfoTitle"))}</h2></div>
    <div class="modal-body">
      <div class="techcard" style="border-color:var(--verify)">
        <div class="tc-top" style="background:var(--verify)">${esc(t("credibility"))}</div>
        <div class="tc-body">${esc(t("meterCredBody"))}</div>
      </div>
      <div class="techcard" style="border-color:var(--pop)">
        <div class="tc-top" style="background:var(--pop)">${esc(t("popularity"))}</div>
        <div class="tc-body">${esc(t("meterPopBody"))}</div>
      </div>
      <div class="techcard" style="border-color:var(--highlight)">
        <div class="tc-top" style="background:#A8841B">${esc(t("srcLabel"))}</div>
        <div class="tc-body">${esc(t("meterSrcBody"))}</div>
      </div>
      <div class="ev-note warn" style="margin-top:10px">${esc(t("meterTension"))}</div>
      <button class="btn-primary" id="mi-close" style="margin-top:14px">${esc(t("backToDesk"))}</button>
    </div></div></div>`;
  $("#mi-close").addEventListener("click",()=>mount.innerHTML="");
  $("#mi-ov").addEventListener("click",e=>{if(e.target.id==="mi-ov")mount.innerHTML="";});
}
$("#btn-guide").addEventListener("click",openGuide);

renderStart();
